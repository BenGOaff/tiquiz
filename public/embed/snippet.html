<!--
  TIQUIZ EMBED — snippets iframe (v2)
  ────────────────────────────────────
  Cette version charge le VRAI éditeur Tiquiz dans un iframe : le
  visiteur édite son quiz exactement avec les composants UI qu'il
  retrouvera dans son compte après commande, sans les options
  systeme.io (tags, course, community) qui sont propres au compte.

  Mode d'emploi :
    1) Dans systeme.io, ajoute un bloc « Code HTML personnalisé »
       à l'endroit où tu veux faire apparaître la démo.
    2) Colle le snippet correspondant à la page.
    3) Remplace REMPLACE-MOI par le domaine de Tiquiz
       (ex : https://app.tiquiz.fr).
    4) Le bridge JS écoute le clic « Débloquer Tiquiz » envoyé par
       l'iframe et redirige vers la bonne ancre tarif. Tu peux
       overrider l'URL via l'attribut data-checkout sur l'iframe.

  Multi-page : tu peux mettre plusieurs <iframe> sur la même page,
  chacun avec son propre data-checkout.
-->


<!-- ════════════════════════════════════════════════════════════ -->
