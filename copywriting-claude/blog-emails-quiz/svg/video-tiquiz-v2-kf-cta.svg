<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="lightBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EEF0FE"/>
      <stop offset="100%" stop-color="#E3F5FC"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5A6EF6"/>
      <stop offset="100%" stop-color="#20BBE6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#5A6EF6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#5A6EF6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,700;0,800;1,800&amp;display=swap');
    text { font-family: 'Plus Jakarta Sans', 'Inter', sans-serif; }
  </style>

  <rect x="0" y="0" width="1920" height="1080" fill="url(#lightBg)"/>

  <ellipse cx="960" cy="540" rx="900" ry="200" fill="url(#glow)" opacity="0.6"/>

  <text x="960" y="560" text-anchor="middle" font-weight="800" font-size="240" letter-spacing="-0.05em" fill="url(#brandGrad)">Arrête</text>
  <text x="960" y="780" text-anchor="middle" font-weight="800" font-size="180" letter-spacing="-0.04em" fill="#2E386E" font-style="italic">de deviner.</text>

  <line x1="80" y1="200" x2="280" y2="180" stroke="#5A6EF6" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <line x1="1640" y1="900" x2="1840" y2="880" stroke="#20BBE6" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <line x1="1620" y1="180" x2="1840" y2="220" stroke="#5A6EF6" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
  <line x1="80" y1="900" x2="280" y2="920" stroke="#20BBE6" stroke-width="8" stroke-linecap="round" opacity="0.4"/>

  <text x="1860" y="1050" text-anchor="end" fill="#6B7280" font-size="16" font-weight="600">v2 — punchline acte 4 (52–58 s)</text>
</svg>
