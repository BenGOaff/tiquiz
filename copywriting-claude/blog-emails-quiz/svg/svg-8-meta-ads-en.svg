<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" preserveAspectRatio="xMidYMid meet" style="font-family:'Inter','Plus Jakarta Sans',-apple-system,system-ui,sans-serif;" role="img" aria-labelledby="t8 d8">
  <title id="t8">Your quiz leads fuel your Meta ads</title>
  <desc id="d8">Three-step workflow turning quiz-tagged leads into a Meta custom audience with a lower CPA, source Meta Business — Lookalike Audiences</desc>

  <defs>
    <linearGradient id="step1Bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5A6EF6"/>
      <stop offset="100%" stop-color="#3F4DBA"/>
    </linearGradient>
    <linearGradient id="step2Bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3F4DBA"/>
      <stop offset="100%" stop-color="#0EA2CB"/>
    </linearGradient>
    <linearGradient id="step3Bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0EA2CB"/>
      <stop offset="100%" stop-color="#20BBE6"/>
    </linearGradient>
    <filter id="shadow8" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#2E386E" flood-opacity="0.15"/>
    </filter>
  </defs>

  <style>
    .bg8 { fill: #F6F7FB; }
    .orb8-i { fill: #5A6EF6; opacity: 0.07; }
    .orb8-c { fill: #20BBE6; opacity: 0.07; }
    .hd8 { fill: #2E386E; font-weight: 900; font-size: 34px; letter-spacing: -0.03em; text-anchor: middle; }
    .sub8 { fill: #6B7280; font-weight: 500; font-size: 17px; text-anchor: middle; }
    .step-num { fill: rgba(255,255,255,0.4); font-weight: 900; font-size: 80px; letter-spacing: -0.04em; }
    .step-title { fill: #fff; font-weight: 900; font-size: 22px; letter-spacing: -0.02em; }
    .step-desc { fill: rgba(255,255,255,0.95); font-weight: 500; font-size: 14px; }
    .step-tag { fill: rgba(255,255,255,0.92); font-weight: 700; font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; }
    .arrow { fill: #2E386E; }
    .src8 { fill: #9AA0B5; font-weight: 600; font-size: 13px; }
    .result-card { fill: #fff; stroke: #20BBE6; stroke-width: 2; }
    .result-label { fill: #2E386E; font-weight: 700; font-size: 16px; }
  </style>

  <rect class="bg8" x="0" y="0" width="1200" height="700" rx="24"/>
  <circle class="orb8-i" cx="180" cy="120" r="220"/>
  <circle class="orb8-c" cx="1020" cy="580" r="240"/>

  <text class="hd8" x="600" y="64">Your quiz leads fuel your Meta ads</text>
  <text class="sub8" x="600" y="98">Three steps to turn a respondent into a low-CPA custom audience.</text>

  <!-- STEP 1 -->
  <g filter="url(#shadow8)">
    <rect x="60" y="170" width="320" height="260" rx="20" fill="url(#step1Bg)"/>
  </g>
  <text class="step-num" x="80" y="240">1</text>
  <text class="step-tag" x="80" y="295">Quiz</text>
  <text class="step-title" x="80" y="335">Your leads tag themselves</text>
  <text class="step-desc" x="80" y="365">On every reply, Tiquiz applies</text>
  <text class="step-desc" x="80" y="385">the profile tag in Systeme.io.</text>
  <text class="step-desc" x="80" y="405">No manual sorting.</text>

  <!-- Arrow 1 → 2 -->
  <g transform="translate(395, 290)">
    <path d="M 0 10 L 30 10 L 30 0 L 50 15 L 30 30 L 30 20 L 0 20 Z" class="arrow" opacity="0.6"/>
  </g>

  <!-- STEP 2 -->
  <g filter="url(#shadow8)">
    <rect x="455" y="170" width="320" height="260" rx="20" fill="url(#step2Bg)"/>
  </g>
  <text class="step-num" x="475" y="240">2</text>
  <text class="step-tag" x="475" y="295">Meta Ads Manager</text>
  <text class="step-title" x="475" y="335">Lookalike audience</text>
  <text class="step-desc" x="475" y="365">Import the per-profile email</text>
  <text class="step-desc" x="475" y="385">export, Meta builds your</text>
  <text class="step-desc" x="475" y="405">custom + lookalike audience.</text>

  <!-- Arrow 2 → 3 -->
  <g transform="translate(790, 290)">
    <path d="M 0 10 L 30 10 L 30 0 L 50 15 L 30 30 L 30 20 L 0 20 Z" class="arrow" opacity="0.6"/>
  </g>

  <!-- STEP 3 -->
  <g filter="url(#shadow8)">
    <rect x="850" y="170" width="320" height="260" rx="20" fill="url(#step3Bg)"/>
  </g>
  <text class="step-num" x="870" y="240">3</text>
  <text class="step-tag" x="870" y="295">Targeted ads</text>
  <text class="step-title" x="870" y="335">CPA divided</text>
  <text class="step-desc" x="870" y="365">Cost per lead noticeably lower</text>
  <text class="step-desc" x="870" y="385">than a cold classic audience.</text>

  <!-- Result card -->
  <g filter="url(#shadow8)">
    <rect class="result-card" x="280" y="490" width="640" height="120" rx="20"/>
  </g>
  <text class="result-label" x="600" y="525" text-anchor="middle" font-size="15">Cost per lead on quiz-based custom audience</text>
  <g transform="translate(440, 580)">
    <text fill="#0EA2CB" font-weight="900" font-size="56" letter-spacing="-0.03em" text-anchor="end">CPA</text>
  </g>
  <g transform="translate(490, 555)">
    <path d="M 0 0 L 30 0 L 15 35 Z" fill="#20BBE6"/>
  </g>
  <text fill="#0EA2CB" font-weight="900" font-size="56" letter-spacing="-0.03em" text-anchor="start" x="540" y="595">divided</text>

  <text class="src8" x="600" y="650" text-anchor="middle">Source: Meta Business — Lookalike Audiences (official page facebook.com/business/ads)</text>

  <text x="1160" y="685" fill="#9AA0B5" font-size="12" font-weight="600" text-anchor="end">— tipote.blog/tiquiz</text>
</svg>
