<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid meet" style="font-family:'Inter',sans-serif;">
  <defs>
    <linearGradient id="lightBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EEF0FE"/>
      <stop offset="100%" stop-color="#E3F5FC"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5A6EF6"/>
      <stop offset="100%" stop-color="#20BBE6"/>
    </linearGradient>
    <filter id="lightShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#2E386E" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1920" height="1080" fill="url(#lightBg)"/>

  <text x="960" y="500" text-anchor="middle" font-weight="900" font-size="140" letter-spacing="-0.04em" fill="url(#brandGrad)">Tiquiz</text>
  <text x="960" y="570" text-anchor="middle" font-weight="600" font-size="36" fill="#6B7280">Le quiz qui vend pour toi</text>

  <!-- Bouton CTA -->
  <g filter="url(#lightShadow)" transform="translate(610, 640)">
    <rect width="700" height="100" rx="50" fill="#2E386E"/>
    <text x="350" y="68" text-anchor="middle" font-weight="900" font-size="44" fill="#fff">Lance ton quiz gratuit →</text>
  </g>

  <!-- Curseur -->
  <g transform="translate(1280, 770)">
    <path d="M 0 0 L 0 30 L 8 22 L 14 36 L 20 33 L 14 19 L 24 19 Z" fill="#2E386E" stroke="#fff" stroke-width="2"/>
  </g>

  <!-- URL -->
  <text x="960" y="820" text-anchor="middle" font-size="22" fill="#6B7280" font-weight="600">tipote.fr/tiquiz</text>

  <text x="1860" y="1050" text-anchor="end" fill="#6B7280" font-size="16" font-weight="600">Acte 4 — CTA (58–60 s)</text>
</svg>
