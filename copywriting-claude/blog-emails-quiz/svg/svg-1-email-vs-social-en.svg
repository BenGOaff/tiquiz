<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" preserveAspectRatio="xMidYMid meet" style="font-family:'Inter','Plus Jakarta Sans',-apple-system,system-ui,sans-serif;" role="img" aria-labelledby="t1 d1">
  <title id="t1">Email vs social media: marketing ROI comparison</title>
  <desc id="d1">Comparison between email marketing with $36 ROI per $1 spent and social media with $5 to $7 ROI per $1 spent</desc>

  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5A6EF6"/>
      <stop offset="100%" stop-color="#20BBE6"/>
    </linearGradient>
    <linearGradient id="winBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EEF0FE"/>
      <stop offset="100%" stop-color="#E3F5FC"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#2E386E" flood-opacity="0.12"/>
    </filter>
  </defs>

  <style>
    .bg { fill: #F6F7FB; }
    .orb-i { fill: #5A6EF6; opacity: 0.07; }
    .orb-c { fill: #20BBE6; opacity: 0.07; }
    .hd { fill: #2E386E; font-weight: 900; font-size: 30px; letter-spacing: -0.03em; text-anchor: middle; }
    .sub { fill: #6B7280; font-weight: 500; font-size: 16px; text-anchor: middle; }
    .card-old { fill: #F0F2F7; stroke: #E6E8F0; stroke-width: 1.5; }
    .card-win { fill: url(#winBg); stroke: rgba(32,187,230,0.3); stroke-width: 1.5; }
    .title-old { fill: #6B7280; font-weight: 900; font-size: 16px; letter-spacing: 0.12em; text-transform: uppercase; }
    .title-win { fill: #0EA2CB; font-weight: 900; font-size: 16px; letter-spacing: 0.12em; text-transform: uppercase; }
    .roi-num { font-weight: 900; font-size: 64px; letter-spacing: -0.04em; text-anchor: middle; }
    .roi-old { fill: #6B7280; opacity: 0.7; }
    .roi-win { fill: #0EA2CB; }
    .roi-label { font-weight: 700; font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; text-anchor: middle; }
    .stat-row { font-size: 14px; font-weight: 600; }
    .stat-num { font-weight: 900; font-size: 18px; letter-spacing: -0.01em; }
    .vs-circle { fill: #fff; stroke: #2E386E; stroke-width: 3; }
    .vs-text { fill: #2E386E; font-weight: 900; font-size: 28px; letter-spacing: -0.02em; text-anchor: middle; }
  </style>

  <rect class="bg" x="0" y="0" width="1200" height="700" rx="24"/>
  <circle class="orb-i" cx="180" cy="120" r="220"/>
  <circle class="orb-c" cx="1020" cy="580" r="240"/>

  <text class="hd" x="600" y="60">Email vs social media: which one actually pays?</text>
  <text class="sub" x="600" y="92">Email crushes everything on the numbers that matter in marketing.</text>

  <!-- ========== CARD GAUCHE — Social media ========== -->
  <g filter="url(#shadow)">
    <rect class="card-old" x="60" y="135" width="480" height="490" rx="22"/>
  </g>
  <text class="title-old" x="90" y="180">Social media</text>

  <text class="roi-num roi-old" x="300" y="290">$5 to $7</text>
  <text class="roi-label" x="300" y="318" fill="#6B7280">FOR EVERY $1 SPENT</text>

  <line x1="120" y1="350" x2="480" y2="350" stroke="#E6E8F0" stroke-width="1.5"/>

  <g transform="translate(120, 380)">
    <text class="stat-row" fill="#9AA0B5">Average organic reach</text>
    <text class="stat-num" x="360" y="0" fill="#6B7280" text-anchor="end">~ 4%</text>
  </g>
  <line x1="120" y1="410" x2="480" y2="410" stroke="#E6E8F0" stroke-width="1" stroke-dasharray="3 3"/>

  <g transform="translate(120, 440)">
    <text class="stat-row" fill="#9AA0B5">Audience you actually own</text>
    <text class="stat-num" x="360" y="0" fill="#6B7280" text-anchor="end">0%</text>
  </g>
  <line x1="120" y1="470" x2="480" y2="470" stroke="#E6E8F0" stroke-width="1" stroke-dasharray="3 3"/>

  <g transform="translate(120, 500)">
    <text class="stat-row" fill="#9AA0B5">Algorithm between you &amp; them</text>
    <text class="stat-num" x="360" y="0" fill="#6B7280" text-anchor="end">Always</text>
  </g>
  <line x1="120" y1="530" x2="480" y2="530" stroke="#E6E8F0" stroke-width="1" stroke-dasharray="3 3"/>

  <g transform="translate(120, 560)">
    <text class="stat-row" fill="#9AA0B5">Source: Hootsuite Trends</text>
  </g>

  <!-- ========== VS ========== -->
  <g transform="translate(600, 365)">
    <circle class="vs-circle" cx="0" cy="0" r="42"/>
    <text class="vs-text" x="0" y="10" text-anchor="middle">× 7</text>
  </g>

  <!-- ========== CARD DROITE — Email ========== -->
  <g filter="url(#shadow)">
    <rect class="card-win" x="660" y="135" width="480" height="490" rx="22"/>
  </g>
  <text class="title-win" x="690" y="180">Email marketing</text>

  <text class="roi-num roi-win" x="900" y="290">$36</text>
  <text class="roi-label" x="900" y="318" fill="#0EA2CB">FOR EVERY $1 SPENT</text>

  <line x1="720" y1="350" x2="1080" y2="350" stroke="rgba(32,187,230,0.2)" stroke-width="1.5"/>

  <g transform="translate(720, 380)">
    <text class="stat-row" fill="#0EA2CB">Average open rate</text>
    <text class="stat-num" x="360" y="0" fill="#0EA2CB" text-anchor="end">21.5%</text>
  </g>
  <line x1="720" y1="410" x2="1080" y2="410" stroke="rgba(32,187,230,0.2)" stroke-width="1" stroke-dasharray="3 3"/>

  <g transform="translate(720, 440)">
    <text class="stat-row" fill="#0EA2CB">Audience you actually own</text>
    <text class="stat-num" x="360" y="0" fill="#0EA2CB" text-anchor="end">100%</text>
  </g>
  <line x1="720" y1="470" x2="1080" y2="470" stroke="rgba(32,187,230,0.2)" stroke-width="1" stroke-dasharray="3 3"/>

  <g transform="translate(720, 500)">
    <text class="stat-row" fill="#0EA2CB">Algorithm between you &amp; them</text>
    <text class="stat-num" x="360" y="0" fill="#0EA2CB" text-anchor="end">None</text>
  </g>
  <line x1="720" y1="530" x2="1080" y2="530" stroke="rgba(32,187,230,0.2)" stroke-width="1" stroke-dasharray="3 3"/>

  <g transform="translate(720, 560)">
    <text class="stat-row" fill="#0EA2CB">Source: Litmus + Mailchimp</text>
  </g>

  <text x="1160" y="675" fill="#9AA0B5" font-size="12" font-weight="600" text-anchor="end">— tipote.fr/tiquiz</text>
</svg>
