<!-- ============================================================== -->
<!-- TIQUIZ BUBBLE BUTTONS v4 — exclusion CSS chirurgicale         -->
<!-- Les règles de style pour les boutons animés sont injectées    -->
<!-- dynamiquement en JS avec :not() pour chaque sélecteur exclu.  -->
<!-- Conséquence : les boutons exclus ne sont JAMAIS touchés par   -->
<!-- mon CSS, leur style Systeme.io natif reste 100% intact.       -->
<!-- ============================================================== -->

<style>
  /* ========== KEYFRAMES (toujours définies, inoffensives si inutilisées) ========== */
  @keyframes tqButtonPulse {
    0% {
      transform: scale(1);
      box-shadow:
        0 4px 14px rgba(90, 110, 246, 0.28),
        0 0 0 0 rgba(32, 187, 230, 0);
    }
    30% {
      transform: scale(1.04);
      box-shadow:
        0 10px 30px rgba(90, 110, 246, 0.45),
        0 0 0 6px rgba(32, 187, 230, 0.12);
    }
    60% {
      transform: scale(1.015);
      box-shadow:
        0 7px 22px rgba(90, 110, 246, 0.35),
        0 0 0 14px rgba(32, 187, 230, 0);
    }
    100% {
      transform: scale(1);
      box-shadow:
        0 4px 14px rgba(90, 110, 246, 0.28),
        0 0 0 0 rgba(32, 187, 230, 0);
    }
  }

  @keyframes tqBubbleMove {
    from { transform: translate(0, 0); }
    to   { transform: translate(var(--tq-dx, 40px), var(--tq-dy, 40px)); }
  }

  @keyframes tqBubbleScale {
    0%   { transform: scale(0);   opacity: 0; }
    18%  { transform: scale(1);   opacity: 1; }
    75%  { transform: scale(1);   opacity: 0.9; }
    100% { transform: scale(0.2); opacity: 0; }
  }

  /* ========== COUCHE DES BULLES (ne s'applique que si JS a injecté) ========== */
  .tq-bubble-layer {
    position: absolute;
    inset: -2px;
    pointer-events: none;
    overflow: visible;
    z-index: 0;
    border-radius: inherit;
  }

  .tq-bubble {
    position: absolute;
    top: var(--tq-start-y, 50%);
    left: var(--tq-start-x, 50%);
    width: var(--tq-size, 6px);
    height: var(--tq-size, 6px);
    margin-top: calc(var(--tq-size, 6px) * -0.5);
    margin-left: calc(var(--tq-size, 6px) * -0.5);
    pointer-events: none;
    animation: tqBubbleMove var(--tq-duration, 1.3s) cubic-bezier(0.16, 0.68, 0.32, 1) forwards;
    will-change: transform;
  }

  .tq-bubble-inner {
    display: block;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    animation: tqBubbleScale var(--tq-duration, 1.3s) ease-out forwards;
    transform: scale(0);
    opacity: 0;
    will-change: transform, opacity;
  }

  .tq-bubble-inner.filled {
    background: var(--tq-color, #5A6EF6);
    box-shadow: 0 0 4px var(--tq-color, #5A6EF6);
  }
  .tq-bubble-inner.ring {
    background: transparent;
    border: 1.5px solid var(--tq-color, #5A6EF6);
  }

  /* Accessibilité */
  @media (prefers-reduced-motion: reduce) {
    [id*="button-"] { animation: none !important; }
    .tq-bubble, .tq-bubble-inner { display: none; }
  }
</style>

<script>
(function () {
  'use strict';

  /* ========== RÉGLAGES ========== */
  var BTN_COLOR = '#5A6EF6';
  var BTN_COLOR_HOVER = '#4858E8';

  var COLORS = ['#20BBE6', '#5A6EF6', '#8FE5F5', '#ffffff', '#5A6EF6'];
  var CYCLE_MS = 1400;
  var FIRST_BURST_OFFSET = Math.round(CYCLE_MS * 0.3);
  var BUBBLES_PER_BURST = 16;
  var MAX_DISTANCE = 85;
  var RING_PROBABILITY = 0.45;

  /*
    ========== SÉLECTEURS À EXCLURE ==========
    Tous les boutons dans ces zones gardent leur style Systeme.io
    natif, sans aucune modif (ni pulse, ni bulles, ni couleur override).
    Ajoute autant de sélecteurs CSS que tu veux.
  */
  var EXCLUDED_SELECTORS = [
    '#row-d79e5a0f',   /* rangée du menu Tiquiz */
    /* '#row-xxxxxxxx', // ajoute ici d'autres rows si besoin */
  ];

  function rand(min, max) { return Math.random() * (max - min) + min; }

  /*
    ========== INJECTION DES STYLES DU BOUTON ==========
    On construit la chaîne de :not() incluant les sélecteurs exclus.
    Résultat : mon CSS ne matche JAMAIS les boutons dans ces zones,
    donc Systeme.io les rend avec ses règles natives, intactes.
  */
  function injectButtonStyles() {
    /* Chaîne de :not() pour opt-out manuel (classe/data-attribute) */
    var optOutClauses =
      ':not([data-no-bubbles])' +
      ':not(.no-bubbles)';

    /* Chaîne de :not() pour les sélecteurs EXCLUDED_SELECTORS.
       Chaque sélecteur génère 2 clauses : l'élément lui-même et ses
       descendants. Utilise CSS Selectors Level 4 (support universel
       sur navigateurs modernes 2022+). */
    var excludeClauses = '';
    for (var i = 0; i < EXCLUDED_SELECTORS.length; i++) {
      var sel = EXCLUDED_SELECTORS[i];
      excludeClauses += ':not(' + sel + ')';
      excludeClauses += ':not(' + sel + ' *)';
    }

    /* Clauses pour les parents avec classe/attribut opt-out */
    excludeClauses += ':not([data-no-bubbles] *)';
    excludeClauses += ':not(.no-bubbles *)';

    var baseSelector = '[id*="button-"]' + optOutClauses + excludeClauses;

    var css = [
      baseSelector + ' {',
      '  position: relative !important;',
      '  overflow: visible !important;',
      '  background: ' + BTN_COLOR + ' !important;',
      '  color: #ffffff !important;',
      '  border: none !important;',
      '  border-radius: 999px;',
      '  font-weight: 700;',
      '  letter-spacing: 0.02em;',
      '  cursor: pointer;',
      '  transition: background-color 0.25s ease;',
      '  animation: tqButtonPulse 1.4s ease-in-out infinite;',
      '  z-index: 1;',
      '  isolation: isolate;',
      '  transform-origin: center center;',
      '}',

      baseSelector + ' > *:not(.tq-bubble-layer):not(.tq-bubble) {',
      '  position: relative;',
      '  z-index: 2;',
      '}',

      baseSelector + ':hover {',
      '  background: ' + BTN_COLOR_HOVER + ' !important;',
      '  animation-duration: 1.1s;',
      '}',

      baseSelector + ':active {',
      '  transform: scale(0.97) !important;',
      '  transition: transform 0.1s ease;',
      '}'
    ].join('\n');

    var style = document.createElement('style');
    style.setAttribute('data-tq-button-styles', '1');
    style.textContent = css;
    (document.head || document.documentElement).appendChild(style);
  }

  /* Injecte dès que possible pour éviter tout flash */
  injectButtonStyles();

  /* ========== SPAWN DES BULLES ========== */

  function spawnBurst(layer) {
    if (!layer || !layer.isConnected) return;

    var count = BUBBLES_PER_BURST + Math.floor(rand(-3, 4));

    for (var i = 0; i < count; i++) {
      var side = Math.floor(Math.random() * 4);
      var startX, startY, dirX, dirY;
      var t = Math.random();

      if (side === 0) {
        startX = t * 100; startY = 0;
        dirX = rand(-0.4, 0.4); dirY = -1;
      } else if (side === 1) {
        startX = 100; startY = t * 100;
        dirX = 1; dirY = rand(-0.4, 0.4);
      } else if (side === 2) {
        startX = t * 100; startY = 100;
        dirX = rand(-0.4, 0.4); dirY = 1;
      } else {
        startX = 0; startY = t * 100;
        dirX = -1; dirY = rand(-0.4, 0.4);
      }

      var distance = rand(MAX_DISTANCE * 0.5, MAX_DISTANCE);
      var dx = dirX * distance;
      var dy = dirY * distance;
      var size = rand(3, 9);
      var duration = rand(1.1, 1.6);
      var color = COLORS[Math.floor(Math.random() * COLORS.length)];
      var isRing = Math.random() < RING_PROBABILITY;

      var outer = document.createElement('span');
      outer.className = 'tq-bubble';
      outer.style.setProperty('--tq-start-x', startX + '%');
      outer.style.setProperty('--tq-start-y', startY + '%');
      outer.style.setProperty('--tq-dx', dx + 'px');
      outer.style.setProperty('--tq-dy', dy + 'px');
      outer.style.setProperty('--tq-size', size + 'px');
      outer.style.setProperty('--tq-duration', duration + 's');

      var inner = document.createElement('span');
      inner.className = 'tq-bubble-inner ' + (isRing ? 'ring' : 'filled');
      inner.style.setProperty('--tq-color', color);
      outer.appendChild(inner);

      layer.appendChild(outer);

      (function (el, life) {
        setTimeout(function () {
          if (el && el.parentNode) el.parentNode.removeChild(el);
        }, life * 1000 + 80);
      })(outer, duration);
    }
  }

  /* ========== EXCLUSION CHECK ========== */

  function isExcluded(btn) {
    if (btn.hasAttribute('data-no-bubbles')) return true;
    if (btn.classList && btn.classList.contains('no-bubbles')) return true;
    if (btn.closest('.no-bubbles, [data-no-bubbles]')) return true;

    if (EXCLUDED_SELECTORS.length) {
      var joined = EXCLUDED_SELECTORS.join(', ');
      try {
        if (btn.closest(joined)) return true;
      } catch (e) { /* sélecteur invalide, ignore */ }
    }
    return false;
  }

  /* ========== ENHANCEMENT ========== */

  function enhanceButton(btn) {
    if (!btn || btn.dataset.tqEnhanced === '1') return;

    if (isExcluded(btn)) {
      /* On marque juste "enhanced" pour ne plus y revenir, mais
         on ne touche RIEN sur le bouton lui-même. Pas de data-tq-no-bubbles
         inutile : le CSS exclut déjà via le sélecteur parent. */
      btn.dataset.tqEnhanced = 'excluded';
      return;
    }

    btn.dataset.tqEnhanced = '1';

    var layer = document.createElement('span');
    layer.className = 'tq-bubble-layer';
    layer.setAttribute('aria-hidden', 'true');
    btn.appendChild(layer);

    var randomOffset = Math.random() * CYCLE_MS;

    setTimeout(function () {
      spawnBurst(layer);
      setInterval(function () {
        if (!layer.isConnected) return;
        spawnBurst(layer);
      }, CYCLE_MS);
    }, FIRST_BURST_OFFSET + randomOffset);
  }

  function enhanceAll(root) {
    (root || document).querySelectorAll('[id*="button-"]').forEach(enhanceButton);
  }

  function ready(fn) {
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', fn);
    } else {
      fn();
    }
  }

  ready(function () {
    if (window.console && EXCLUDED_SELECTORS.length) {
      EXCLUDED_SELECTORS.forEach(function (sel) {
        var found = document.querySelectorAll(sel);
        console.log('[tq-bubbles] "' + sel + '" →',
          found.length ? found.length + ' élément(s) trouvé(s)' : 'AUCUN ÉLÉMENT — vérifie l\'ID');
      });
    }

    enhanceAll(document);

    /* Observer pour boutons ajoutés async par Systeme.io */
    var observer = new MutationObserver(function (mutations) {
      mutations.forEach(function (m) {
        m.addedNodes.forEach(function (node) {
          if (node.nodeType !== 1) return;
          if (node.id && node.id.indexOf('button-') !== -1) enhanceButton(node);
          if (node.querySelectorAll) enhanceAll(node);
        });
      });
    });
    observer.observe(document.body, { childList: true, subtree: true });
  });
})();
</script>
