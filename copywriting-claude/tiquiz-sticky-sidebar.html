<!-- ============================================================== -->
<!-- TIQUIZ STICKY SIDEBAR — pour Systeme.io                       -->
<!--                                                                -->
<!-- Rend la rangée #row-c827468d "sticky" sur desktop uniquement   -->
<!-- (>= 1024 px). Sur mobile/tablette, elle défile normalement.    -->
<!--                                                                -->
<!-- Contourne les conflits z-index de Systeme.io en utilisant      -->
<!-- position: fixed (au lieu de position: sticky) avec z-index     -->
<!-- forcé et isolation: isolate.                                   -->
<!--                                                                -->
<!-- À coller dans un bloc "Code HTML" Systeme.io.                  -->
<!-- Idéalement dans le footer global pour couvrir toute la page.   -->
<!-- ============================================================== -->

<style>
  /* Styles appliqués UNIQUEMENT quand la rangée est en mode "sticky" */
  .tq-sticky-active {
    position: fixed !important;
    z-index: 9999 !important;
    isolation: isolate !important;
    pointer-events: auto !important;
    transition: none !important;
  }

  /* Tout ce qui est dedans reste cliquable */
  .tq-sticky-active * {
    pointer-events: auto !important;
  }

  /* Placeholder invisible qui garde la place dans le layout */
  .tq-sticky-placeholder {
    visibility: hidden !important;
    pointer-events: none !important;
  }
</style>

<script>
(function () {
  'use strict';

  /* ========== RÉGLAGES ========== */

  /* ID de la rangée Systeme.io à rendre sticky */
  var STICKY_ID = 'row-c827468d';

  /* Largeur minimale en pixels pour activer le sticky.
     En dessous (mobile/tablette), la rangée défile normalement. */
  var DESKTOP_BREAKPOINT = 1024;

  /* Distance en pixels entre le haut du viewport et la rangée
     quand elle est sticky. Augmente cette valeur si tu as une
     barre de menu fixe en haut de page. */
  var TOP_OFFSET = 100;

  /* ========== ÉTAT INTERNE ========== */

  var element = null;
  var placeholder = null;
  var isSticky = false;
  var rafPending = false;

  /* ========== HELPERS ========== */

  function isDesktop() {
    return window.innerWidth >= DESKTOP_BREAKPOINT;
  }

  function getNaturalTop() {
    /* Renvoie la position absolue (depuis le haut du document) de
       l'endroit où la rangée DOIT se trouver dans le flow normal.
       Si la rangée est en mode sticky, on regarde le placeholder.
       Sinon, on regarde la rangée elle-même. */
    var ref = (isSticky && placeholder.parentNode) ? placeholder : element;
    return window.pageYOffset + ref.getBoundingClientRect().top;
  }

  function makeSticky() {
    if (isSticky) return;
    var rect = element.getBoundingClientRect();

    /* Configurer le placeholder avec les mêmes dimensions */
    placeholder.style.height = rect.height + 'px';
    placeholder.style.width = rect.width + 'px';
    placeholder.style.marginTop = window.getComputedStyle(element).marginTop;
    placeholder.style.marginBottom = window.getComputedStyle(element).marginBottom;

    /* Insérer le placeholder à la place de l'élément */
    element.parentNode.insertBefore(placeholder, element);

    /* Passer l'élément en fixed avec les bonnes coordonnées */
    element.style.left = rect.left + 'px';
    element.style.width = rect.width + 'px';
    element.style.top = TOP_OFFSET + 'px';
    element.classList.add('tq-sticky-active');

    isSticky = true;
  }

  function unmakeSticky() {
    if (!isSticky) return;

    element.classList.remove('tq-sticky-active');
    element.style.left = '';
    element.style.width = '';
    element.style.top = '';

    if (placeholder.parentNode) {
      placeholder.parentNode.removeChild(placeholder);
    }

    isSticky = false;
  }

  function updateStickyPosition() {
    /* Met à jour les coordonnées si le viewport est redimensionné
       ou si la mise en page change (ex : images chargées). */
    if (!isSticky || !placeholder.parentNode) return;
    var rect = placeholder.getBoundingClientRect();
    element.style.left = (window.pageXOffset + rect.left) - window.pageXOffset + 'px';
    element.style.width = rect.width + 'px';
  }

  function onScroll() {
    if (rafPending) return;
    rafPending = true;
    requestAnimationFrame(function () {
      rafPending = false;
      if (!element) return;

      if (!isDesktop()) {
        unmakeSticky();
        return;
      }

      var scrollTop = window.pageYOffset;
      var naturalTop = getNaturalTop();

      if (scrollTop > naturalTop - TOP_OFFSET) {
        if (!isSticky) makeSticky();
      } else {
        if (isSticky) unmakeSticky();
      }
    });
  }

  function onResize() {
    if (!element) return;

    if (!isDesktop()) {
      unmakeSticky();
    } else {
      updateStickyPosition();
      onScroll();
    }
  }

  function init() {
    element = document.getElementById(STICKY_ID);
    if (!element) {
      if (window.console) {
        console.log('[tq-sticky] Rangée "#' + STICKY_ID + '" introuvable. Vérifie l\'ID.');
      }
      return;
    }

    /* Créer le placeholder une seule fois */
    placeholder = document.createElement('div');
    placeholder.className = 'tq-sticky-placeholder';

    /* Lier les events scroll + resize */
    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('resize', onResize, { passive: true });

    /* Vérification initiale */
    onScroll();

    if (window.console) {
      console.log('[tq-sticky] Rangée "#' + STICKY_ID + '" sticky activée sur desktop.');
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
