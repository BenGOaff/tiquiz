<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid meet" style="font-family:'Inter','Plus Jakarta Sans',-apple-system,system-ui,sans-serif;" role="img" aria-labelledby="tqIaTitle tqIaDesc">
  <title id="tqIaTitle">Génération du quiz par l'IA Tiquiz à partir d'un brief court</title>
  <desc id="tqIaDesc">Visualisation du flow où un brief en quelques lignes est transformé par l'IA Tiquiz en un quiz complet avec questions, options et profils de résultat</desc>

  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5A6EF6"/>
      <stop offset="100%" stop-color="#20BBE6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#2E386E" flood-opacity="0.12"/>
    </filter>
  </defs>

  <style>
    .bg { fill: #F6F7FB; }
    .orb-i { fill: #5A6EF6; opacity: 0.07; }
    .orb-c { fill: #20BBE6; opacity: 0.07; }
    .hd { fill: #2E386E; font-weight: 900; font-size: 28px; letter-spacing: -0.03em; text-anchor: middle; }
    .sub { fill: #6B7280; font-weight: 500; font-size: 15px; text-anchor: middle; }
    .col-title { fill: #9AA0B5; font-weight: 700; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; }

    .brief-card { fill: #fff; stroke: #E6E8F0; stroke-width: 1.5; }
    .brief-label { fill: #9AA0B5; font-weight: 700; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; }
    .brief-value { fill: #2E386E; font-weight: 700; font-size: 13px; }

    .ia-card { fill: url(#grad); }
    .ia-text { fill: #fff; font-weight: 900; font-size: 15px; letter-spacing: -0.01em; text-anchor: middle; }
    .ia-sub { fill: rgba(255,255,255,0.85); font-weight: 600; font-size: 11px; letter-spacing: 0.06em; text-anchor: middle; }

    .quiz-card { fill: #fff; stroke: rgba(32,187,230,0.3); stroke-width: 1.5; }
    .quiz-title { fill: #2E386E; font-weight: 900; font-size: 17px; letter-spacing: -0.02em; }
    .quiz-q { fill: #2E386E; font-weight: 700; font-size: 12px; }
    .quiz-opt { fill: #6B7280; font-weight: 500; font-size: 11px; }
    .quiz-result-pill { fill: #5A6EF6; }
    .quiz-result-text { fill: #fff; font-weight: 800; font-size: 11px; text-anchor: middle; }

    @keyframes flow { to { stroke-dashoffset: -32; } }
    @keyframes pulse { 0%,100% { opacity: 0.85; } 50% { opacity: 1; } }
    .flow-line { stroke-dasharray: 10 6; animation: flow 1.4s linear infinite; }
    .ia-pulse { animation: pulse 2s ease-in-out infinite; }
  </style>

  <rect class="bg" x="0" y="0" width="1200" height="600" rx="24"/>
  <circle class="orb-i" cx="160" cy="120" r="200"/>
  <circle class="orb-c" cx="1040" cy="500" r="220"/>

  <text class="hd" x="600" y="55">L'IA fait le boulot à partir d'un brief en 4 lignes</text>
  <text class="sub" x="600" y="84">Tu remplis. Tiquiz génère. Tu ajustes ce qui ne te plaît pas.</text>

  <!-- Brief card (left) -->
  <g filter="url(#shadow)" transform="translate(60, 130)">
    <rect class="brief-card" x="0" y="0" width="320" height="370" rx="18"/>
    <text class="col-title" x="20" y="34">Ton brief</text>

    <g transform="translate(20, 60)">
      <rect x="0" y="0" width="280" height="62" rx="10" fill="#F6F7FB" stroke="#E6E8F0"/>
      <text class="brief-label" x="14" y="20">Objectif</text>
      <text class="brief-value" x="14" y="42">Qualifier mes visiteurs</text>
      <text class="brief-value" x="14" y="56">prêts à commander ma formation</text>
    </g>

    <g transform="translate(20, 132)">
      <rect x="0" y="0" width="280" height="62" rx="10" fill="#F6F7FB" stroke="#E6E8F0"/>
      <text class="brief-label" x="14" y="20">Audience</text>
      <text class="brief-value" x="14" y="42">Maîtres de chien</text>
      <text class="brief-value" x="14" y="56">débutants, FR</text>
    </g>

    <g transform="translate(20, 204)">
      <rect x="0" y="0" width="280" height="44" rx="10" fill="#F6F7FB" stroke="#E6E8F0"/>
      <text class="brief-label" x="14" y="20">Ton</text>
      <text class="brief-value" x="14" y="38">tutoiement chaleureux</text>
    </g>

    <g transform="translate(20, 258)">
      <rect x="0" y="0" width="280" height="44" rx="10" fill="#F6F7FB" stroke="#E6E8F0"/>
      <text class="brief-label" x="14" y="20">CTA final</text>
      <text class="brief-value" x="14" y="38">page de vente formation</text>
    </g>

    <g transform="translate(20, 320)">
      <rect x="0" y="0" width="280" height="36" rx="10" fill="url(#grad)"/>
      <text x="140" y="23" fill="#fff" font-weight="800" font-size="13" text-anchor="middle">Générer ✨</text>
    </g>
  </g>

  <!-- IA pulsing center -->
  <g transform="translate(440, 290)">
    <line class="flow-line" x1="0" y1="0" x2="80" y2="0" stroke="#20BBE6" stroke-width="3" stroke-linecap="round"/>
    <polygon points="80,-6 92,0 80,6" fill="#20BBE6"/>
  </g>

  <g class="ia-pulse" transform="translate(580, 290)">
    <circle cx="0" cy="0" r="48" fill="url(#grad)" opacity="0.18"/>
    <circle cx="0" cy="0" r="36" fill="url(#grad)"/>
    <text x="0" y="0" fill="#fff" font-weight="900" font-size="14" text-anchor="middle">IA</text>
    <text x="0" y="16" fill="rgba(255,255,255,0.85)" font-weight="600" font-size="9" text-anchor="middle">CLAUDE</text>
  </g>

  <g transform="translate(648, 290)">
    <line class="flow-line" x1="0" y1="0" x2="80" y2="0" stroke="#20BBE6" stroke-width="3" stroke-linecap="round"/>
    <polygon points="80,-6 92,0 80,6" fill="#20BBE6"/>
  </g>

  <!-- Generated quiz preview (right) -->
  <g filter="url(#shadow)" transform="translate(770, 130)">
    <rect class="quiz-card" x="0" y="0" width="370" height="370" rx="18"/>
    <text class="col-title" x="20" y="34" fill="#0EA2CB">Quiz généré</text>

    <g transform="translate(20, 56)">
      <text class="quiz-title">Quel maître de chien es-tu ?</text>
    </g>

    <g class="item d1" transform="translate(20, 90)">
      <rect x="0" y="0" width="330" height="48" rx="10" fill="#F6F7FB" stroke="#E6E8F0"/>
      <text class="quiz-q" x="14" y="19">Q1. Depuis combien de temps as-tu ton chien ?</text>
      <rect x="14" y="28" width="110" height="14" rx="3" fill="#EEF0FE"/>
      <rect x="130" y="28" width="80" height="14" rx="3" fill="#E3F5FC"/>
      <rect x="216" y="28" width="100" height="14" rx="3" fill="#EEF0FE"/>
    </g>

    <g class="item d2" transform="translate(20, 148)">
      <rect x="0" y="0" width="330" height="48" rx="10" fill="#F6F7FB" stroke="#E6E8F0"/>
      <text class="quiz-q" x="14" y="19">Q2. Qu'est-ce qui t'énerve le plus en ce moment ?</text>
      <rect x="14" y="28" width="100" height="14" rx="3" fill="#E3F5FC"/>
      <rect x="120" y="28" width="120" height="14" rx="3" fill="#EEF0FE"/>
      <rect x="246" y="28" width="70" height="14" rx="3" fill="#E3F5FC"/>
    </g>

    <g class="item d3" transform="translate(20, 206)">
      <rect x="0" y="0" width="330" height="48" rx="10" fill="#F6F7FB" stroke="#E6E8F0"/>
      <text class="quiz-q" x="14" y="19">Q3. Quel résultat tu veux obtenir d'ici 3 mois ?</text>
      <rect x="14" y="28" width="80" height="14" rx="3" fill="#EEF0FE"/>
      <rect x="100" y="28" width="120" height="14" rx="3" fill="#E3F5FC"/>
      <rect x="226" y="28" width="90" height="14" rx="3" fill="#EEF0FE"/>
    </g>

    <g class="item d4" transform="translate(20, 264)">
      <text class="col-title" x="0" y="0">4 profils de résultat</text>
      <g transform="translate(0, 14)">
        <rect x="0" y="0" width="78" height="22" rx="11" fill="#5A6EF6"/>
        <text class="quiz-result-text" x="39" y="15">Débutante</text>
      </g>
      <g transform="translate(86, 14)">
        <rect x="0" y="0" width="68" height="22" rx="11" fill="#20BBE6"/>
        <text class="quiz-result-text" x="34" y="15">Motivée</text>
      </g>
      <g transform="translate(162, 14)">
        <rect x="0" y="0" width="92" height="22" rx="11" fill="#3F4DBA"/>
        <text class="quiz-result-text" x="46" y="15">Pragmatique</text>
      </g>
      <g transform="translate(262, 14)">
        <rect x="0" y="0" width="68" height="22" rx="11" fill="#0EA2CB"/>
        <text class="quiz-result-text" x="34" y="15">Avancée</text>
      </g>
    </g>

    <g transform="translate(20, 332)">
      <text x="0" y="0" fill="#9AA0B5" font-size="11" font-weight="600">Tout est modifiable. Tu adaptes ce qui ne te plaît pas.</text>
    </g>
  </g>

  <text x="1160" y="580" fill="#9AA0B5" font-size="12" font-weight="600" text-anchor="end">— tipote.fr/tiquiz</text>
</svg>
