<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid meet" style="font-family:'Inter','Plus Jakarta Sans',-apple-system,system-ui,sans-serif;" role="img" aria-labelledby="tqViralTitle tqViralDesc">
  <title id="tqViralTitle">Mécanique de viralité du quiz Tiquiz par share bonus</title>
  <desc id="tqViralDesc">Schéma de la mécanique de partage où le visiteur partage le quiz pour débloquer son bonus, ce qui ramène plusieurs nouveaux leads qualifiés</desc>

  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5A6EF6"/>
      <stop offset="100%" stop-color="#20BBE6"/>
    </linearGradient>
    <linearGradient id="softBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EEF0FE"/>
      <stop offset="100%" stop-color="#E3F5FC"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#2E386E" flood-opacity="0.12"/>
    </filter>
  </defs>

  <style>
    .bg { fill: #F6F7FB; }
    .orb-i { fill: #5A6EF6; opacity: 0.07; }
    .orb-c { fill: #20BBE6; opacity: 0.07; }
    .hd { fill: #2E386E; font-weight: 900; font-size: 28px; letter-spacing: -0.03em; text-anchor: middle; }
    .sub { fill: #6B7280; font-weight: 500; font-size: 15px; text-anchor: middle; }
    .col-title { fill: #9AA0B5; font-weight: 700; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; }

    .card { fill: #fff; stroke: #E6E8F0; stroke-width: 1.5; }
    .card-result { fill: url(#softBg); stroke: rgba(32,187,230,0.3); stroke-width: 1.5; }
    .card-share { fill: url(#grad); }
    .card-bonus { fill: #fff; stroke: rgba(90,110,246,0.3); stroke-width: 1.5; }

    .name { fill: #2E386E; font-weight: 800; font-size: 14px; }
    .desc { fill: #6B7280; font-weight: 500; font-size: 11px; }
    .share-title { fill: #fff; font-weight: 900; font-size: 15px; letter-spacing: -0.01em; }
    .share-sub { fill: rgba(255,255,255,0.85); font-weight: 600; font-size: 11px; }
    .bonus-label { fill: #5A6EF6; font-weight: 900; font-size: 10px; letter-spacing: 0.1em; }
    .bonus-text { fill: #2E386E; font-weight: 800; font-size: 13px; }
    .lead-add { fill: #fff; font-weight: 900; font-size: 11px; }
    .multiplier { fill: #2E386E; font-weight: 900; font-size: 36px; letter-spacing: -0.04em; text-anchor: middle; }
    .multiplier-sub { fill: #6B7280; font-weight: 700; font-size: 11px; letter-spacing: 0.06em; text-anchor: middle; text-transform: uppercase; }

    @keyframes flowDash { to { stroke-dashoffset: -30; } }
    @keyframes pulse { 0%,100% { opacity: 0.85; } 50% { opacity: 1; } }
    @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
    .flow { stroke-dasharray: 10 6; animation: flowDash 1.4s linear infinite; }
    .pulse-bonus { animation: pulse 2s ease-in-out infinite; }
    .lead-bounce { animation: bounce 2s ease-in-out infinite; transform-origin: center; }
    .lead-d1 { animation-delay: 0.2s; }
    .lead-d2 { animation-delay: 0.4s; }
    .lead-d3 { animation-delay: 0.6s; }
    .lead-d4 { animation-delay: 0.8s; }
  </style>

  <rect class="bg" x="0" y="0" width="1200" height="600" rx="24"/>
  <circle class="orb-i" cx="160" cy="120" r="200"/>
  <circle class="orb-c" cx="1040" cy="500" r="220"/>

  <text class="hd" x="600" y="55">Le partage débloque le résultat (et fait grossir ta liste)</text>
  <text class="sub" x="600" y="84">Optionnel chez Tiquiz. Mais quand tu l'actives, tes leads en amènent d'autres.</text>

  <!-- ÉTAPE 1 : Visitor at result moment -->
  <g filter="url(#shadow)" transform="translate(60, 145)">
    <rect class="card" x="0" y="0" width="270" height="320" rx="18"/>
    <text class="col-title" x="20" y="32">Étape 1 · Sandra finit le quiz</text>

    <g transform="translate(20, 50)">
      <circle cx="22" cy="22" r="22" fill="#20BBE6"/>
      <text x="22" y="29" fill="#fff" font-weight="900" font-size="16" text-anchor="middle">S</text>
      <text class="name" x="56" y="20">Sandra C.</text>
      <text class="desc" x="56" y="36">a fini ton quiz</text>
    </g>

    <g transform="translate(20, 110)">
      <rect x="0" y="0" width="230" height="180" rx="12" fill="#F6F7FB" stroke="#E6E8F0"/>
      <text x="14" y="26" fill="#9AA0B5" font-size="10" font-weight="700" letter-spacing="0.06em" text-transform="uppercase">Ton résultat</text>
      <text x="14" y="48" fill="#2E386E" font-size="14" font-weight="900">Profil : Motivée</text>
      <rect x="14" y="60" width="160" height="6" rx="3" fill="#E6E8F0"/>
      <rect x="14" y="74" width="200" height="6" rx="3" fill="#E6E8F0"/>
      <rect x="14" y="88" width="140" height="6" rx="3" fill="#E6E8F0"/>

      <!-- Overlay flou -->
      <rect x="0" y="100" width="230" height="80" rx="0" fill="#fff" opacity="0.85"/>
      <text x="115" y="130" fill="#2E386E" font-size="11" font-weight="800" text-anchor="middle">🔒 Bonus à débloquer</text>
      <text x="115" y="148" fill="#6B7280" font-size="10" font-weight="600" text-anchor="middle">Partage pour voir la suite</text>
      <text x="115" y="164" fill="#6B7280" font-size="10" font-weight="600" text-anchor="middle">+ recevoir le PDF cadeau</text>
    </g>
  </g>

  <!-- Arrow 1 -->
  <g transform="translate(340, 305)">
    <line class="flow" x1="0" y1="0" x2="60" y2="0" stroke="#20BBE6" stroke-width="3" stroke-linecap="round"/>
    <polygon points="60,-6 72,0 60,6" fill="#20BBE6"/>
  </g>

  <!-- ÉTAPE 2 : Share to socials -->
  <g filter="url(#shadow)" transform="translate(420, 145)">
    <rect class="card-share" x="0" y="0" width="270" height="320" rx="18"/>
    <text x="20" y="32" fill="rgba(255,255,255,0.85)" font-weight="700" font-size="11" letter-spacing="0.08em" text-transform="uppercase">Étape 2 · Elle partage</text>
    <text class="share-title" x="20" y="60">Pour voir le résultat</text>
    <text class="share-title" x="20" y="80">complet, elle partage</text>
    <text class="share-title" x="20" y="100">le quiz</text>
    <text class="share-sub" x="20" y="124">→ bonus débloqué à son retour</text>

    <!-- Social icons -->
    <g transform="translate(20, 150)">
      <g>
        <rect x="0" y="0" width="54" height="46" rx="10" fill="#fff"/>
        <text x="27" y="29" fill="#2E386E" font-weight="900" font-size="11" text-anchor="middle">IG</text>
      </g>
      <g transform="translate(60, 0)">
        <rect x="0" y="0" width="54" height="46" rx="10" fill="#fff"/>
        <text x="27" y="29" fill="#2E386E" font-weight="900" font-size="9" text-anchor="middle">LinkedIn</text>
      </g>
      <g transform="translate(120, 0)">
        <rect x="0" y="0" width="54" height="46" rx="10" fill="#fff"/>
        <text x="27" y="29" fill="#2E386E" font-weight="900" font-size="10" text-anchor="middle">TikTok</text>
      </g>
      <g transform="translate(180, 0)">
        <rect x="0" y="0" width="54" height="46" rx="10" fill="#fff"/>
        <text x="27" y="29" fill="#2E386E" font-weight="900" font-size="11" text-anchor="middle">Fb / X</text>
      </g>
    </g>

    <!-- Tag "partagé" badge -->
    <g transform="translate(20, 220)">
      <rect x="0" y="0" width="230" height="44" rx="10" fill="rgba(255,255,255,0.18)"/>
      <text x="14" y="20" fill="rgba(255,255,255,0.85)" font-size="10" font-weight="700" letter-spacing="0.08em" text-transform="uppercase">+ tag posé dans Systeme io</text>
      <text x="14" y="36" fill="#fff" font-size="13" font-weight="900" font-family="Courier New">quiz-partage</text>
    </g>

    <text x="20" y="290" fill="rgba(255,255,255,0.75)" font-size="11" font-weight="500">Tu peux traiter ces leads-ambassadeurs différemment.</text>
  </g>

  <!-- Arrow 2 -->
  <g transform="translate(700, 305)">
    <line class="flow" x1="0" y1="0" x2="60" y2="0" stroke="#20BBE6" stroke-width="3" stroke-linecap="round"/>
    <polygon points="60,-6 72,0 60,6" fill="#20BBE6"/>
  </g>

  <!-- ÉTAPE 3 : Multiplication des leads -->
  <g filter="url(#shadow)" transform="translate(780, 145)">
    <rect class="card-bonus" x="0" y="0" width="370" height="320" rx="18"/>
    <text class="col-title" x="20" y="32">Étape 3 · Sa story ramène d'autres leads</text>

    <!-- Original lead bigger -->
    <g transform="translate(60, 80)">
      <circle cx="22" cy="22" r="22" fill="#20BBE6"/>
      <text x="22" y="29" fill="#fff" font-weight="900" font-size="16" text-anchor="middle">S</text>
    </g>

    <!-- New leads scattered around -->
    <g transform="translate(150, 70)" class="lead-bounce">
      <circle cx="0" cy="0" r="18" fill="#5A6EF6"/>
      <text class="lead-add" x="0" y="5" text-anchor="middle">+1</text>
    </g>
    <g transform="translate(220, 90)" class="lead-bounce lead-d1">
      <circle cx="0" cy="0" r="18" fill="#3F4DBA"/>
      <text class="lead-add" x="0" y="5" text-anchor="middle">+1</text>
    </g>
    <g transform="translate(290, 80)" class="lead-bounce lead-d2">
      <circle cx="0" cy="0" r="18" fill="#0EA2CB"/>
      <text class="lead-add" x="0" y="5" text-anchor="middle">+1</text>
    </g>
    <g transform="translate(180, 150)" class="lead-bounce lead-d3">
      <circle cx="0" cy="0" r="18" fill="#5A6EF6"/>
      <text class="lead-add" x="0" y="5" text-anchor="middle">+1</text>
    </g>
    <g transform="translate(260, 160)" class="lead-bounce lead-d4">
      <circle cx="0" cy="0" r="18" fill="#20BBE6"/>
      <text class="lead-add" x="0" y="5" text-anchor="middle">+1</text>
    </g>

    <!-- Multiplier band -->
    <g transform="translate(20, 220)">
      <rect x="0" y="0" width="330" height="80" rx="14" fill="url(#softBg)"/>
      <text class="multiplier" x="60" y="50">× 5</text>
      <text x="120" y="34" fill="#2E386E" font-size="14" font-weight="800">Pour 1 lead capté,</text>
      <text x="120" y="54" fill="#2E386E" font-size="14" font-weight="800">5 nouveaux arrivent en moyenne</text>
    </g>
  </g>

  <text x="1160" y="585" fill="#9AA0B5" font-size="12" font-weight="600" text-anchor="end">— tipote.fr/tiquiz</text>
</svg>
