<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" preserveAspectRatio="xMidYMid meet" style="font-family:'Inter','Plus Jakarta Sans',-apple-system,system-ui,sans-serif;" role="img" aria-labelledby="tqStackTitle tqStackDesc">
  <title id="tqStackTitle">Comparaison stack Typeform Zapier Systeme.io versus Tiquiz natif</title>
  <desc id="tqStackDesc">Visualisation comparative entre le bricolage à 79 euros par mois et la connexion native Tiquiz à 57 euros à vie</desc>

  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5A6EF6"/>
      <stop offset="100%" stop-color="#20BBE6"/>
    </linearGradient>
    <linearGradient id="winBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EEF0FE"/>
      <stop offset="100%" stop-color="#E3F5FC"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#2E386E" flood-opacity="0.12"/>
    </filter>
  </defs>

  <style>
    .bg { fill: #F6F7FB; }
    .orb-i { fill: #5A6EF6; opacity: 0.07; }
    .orb-c { fill: #20BBE6; opacity: 0.07; }
    .hd { fill: #2E386E; font-weight: 900; font-size: 30px; letter-spacing: -0.03em; text-anchor: middle; }
    .sub { fill: #6B7280; font-weight: 500; font-size: 16px; text-anchor: middle; }
    .card-old { fill: #F0F2F7; stroke: #E6E8F0; stroke-width: 1.5; }
    .card-new { fill: url(#winBg); stroke: rgba(32,187,230,0.3); stroke-width: 1.5; }
    .title-old { fill: #6B7280; font-weight: 900; font-size: 18px; letter-spacing: 0.12em; text-transform: uppercase; }
    .title-new { fill: #0EA2CB; font-weight: 900; font-size: 18px; letter-spacing: 0.12em; text-transform: uppercase; }
    .tool-name { fill: #2E386E; font-weight: 800; font-size: 16px; }
    .tool-sub { fill: #9AA0B5; font-weight: 500; font-size: 12px; }
    .tool-name-w { fill: #2E386E; font-weight: 800; font-size: 17px; }
    .tool-sub-w { fill: #6B7280; font-weight: 500; font-size: 12px; }
    .cost-old-num { fill: #2E386E; font-weight: 900; font-size: 28px; letter-spacing: -0.02em; text-anchor: middle; opacity: 0.65; }
    .cost-old-sub { fill: #6B7280; font-weight: 700; font-size: 13px; text-anchor: middle; }
    .vs { fill: #2E386E; font-weight: 900; font-size: 36px; letter-spacing: -0.02em; }

    @keyframes flowDash { to { stroke-dashoffset: -30; } }
    @keyframes leakDash { to { stroke-dashoffset: -16; } }
    .flow { stroke-dasharray: 10 6; animation: flowDash 1.4s linear infinite; }
    .leak { stroke-dasharray: 4 8; animation: leakDash 1.6s linear infinite; }
  </style>

  <rect class="bg" x="0" y="0" width="1200" height="700" rx="24"/>
  <circle class="orb-i" cx="180" cy="120" r="220"/>
  <circle class="orb-c" cx="1020" cy="580" r="240"/>

  <text class="hd" x="600" y="60">Bricolage classique vs connexion native Tiquiz</text>
  <text class="sub" x="600" y="92">Pour ajouter un quiz à ton tunnel Systeme.io, tu as 2 options.</text>

  <!-- ========== CARD GAUCHE ========== -->
  <g filter="url(#shadow)">
    <rect class="card-old" x="60" y="135" width="480" height="510" rx="22"/>
  </g>
  <text class="title-old" x="90" y="180">Le bricolage</text>

  <g transform="translate(120, 215)">
    <rect x="0" y="0" width="360" height="62" rx="14" fill="#fff" stroke="#E6E8F0"/>
    <rect x="14" y="14" width="34" height="34" rx="8" fill="#9AA0B5"/>
    <text x="31" y="36" fill="#fff" font-weight="900" font-size="13" text-anchor="middle">T</text>
    <text class="tool-name" x="62" y="30">Typeform Plus</text>
    <text class="tool-sub" x="62" y="48">50 €/mois · pour le formulaire</text>
  </g>

  <g transform="translate(300, 285)">
    <line class="leak" x1="0" y1="0" x2="0" y2="22" stroke="#9AA0B5" stroke-width="3" stroke-linecap="round"/>
    <polygon points="-6,22 0,32 6,22" fill="#9AA0B5"/>
  </g>

  <g transform="translate(120, 325)">
    <rect x="0" y="0" width="360" height="62" rx="14" fill="#fff" stroke="#E6E8F0"/>
    <rect x="14" y="14" width="34" height="34" rx="8" fill="#9AA0B5"/>
    <text x="31" y="36" fill="#fff" font-weight="900" font-size="13" text-anchor="middle">Z</text>
    <text class="tool-name" x="62" y="30">Zapier</text>
    <text class="tool-sub" x="62" y="48">29 €/mois · pour faire le pont</text>
  </g>

  <g transform="translate(300, 395)">
    <line class="leak" x1="0" y1="0" x2="0" y2="22" stroke="#9AA0B5" stroke-width="3" stroke-linecap="round"/>
    <polygon points="-6,22 0,32 6,22" fill="#9AA0B5"/>
  </g>

  <g transform="translate(120, 435)">
    <rect x="0" y="0" width="360" height="62" rx="14" fill="#fff" stroke="#E6E8F0"/>
    <rect x="14" y="14" width="34" height="34" rx="8" fill="#2E386E"/>
    <text x="31" y="36" fill="#fff" font-weight="900" font-size="13" text-anchor="middle">S</text>
    <text class="tool-name" x="62" y="30">Systeme.io</text>
    <text class="tool-sub" x="62" y="48">tes leads, enfin (parfois)</text>
  </g>

  <g transform="translate(300, 540)">
    <rect x="-150" y="0" width="300" height="78" rx="14" fill="#E6E8F0"/>
    <text class="cost-old-num" x="0" y="36">79 €/mois</text>
    <text class="cost-old-sub" x="0" y="58">soit ~950 €/an, à vie</text>
  </g>

  <!-- ========== VS ========== -->
  <g transform="translate(600, 380)">
    <circle cx="0" cy="0" r="42" fill="#fff" stroke="#2E386E" stroke-width="3"/>
    <text class="vs" x="0" y="14" text-anchor="middle">VS</text>
  </g>

  <!-- ========== CARD DROITE ========== -->
  <g filter="url(#shadow)">
    <rect class="card-new" x="660" y="135" width="480" height="510" rx="22"/>
  </g>
  <text class="title-new" x="690" y="180">Tiquiz natif</text>

  <g transform="translate(720, 245)">
    <rect x="0" y="0" width="360" height="72" rx="14" fill="#fff" stroke="rgba(32,187,230,0.3)"/>
    <rect x="14" y="14" width="44" height="44" rx="10" fill="url(#grad)"/>
    <text x="36" y="42" fill="#fff" font-weight="900" font-size="14" text-anchor="middle">tq</text>
    <text class="tool-name-w" x="72" y="32">Tiquiz</text>
    <text class="tool-sub-w" x="72" y="52">l'outil qui crée ton quiz et le branche direct</text>
  </g>

  <g transform="translate(900, 335)">
    <line class="flow" x1="0" y1="0" x2="0" y2="40" stroke="#20BBE6" stroke-width="4" stroke-linecap="round"/>
    <polygon points="-7,40 0,52 7,40" fill="#20BBE6"/>
  </g>

  <g transform="translate(720, 395)">
    <rect x="0" y="0" width="360" height="72" rx="14" fill="#fff" stroke="rgba(32,187,230,0.3)"/>
    <rect x="14" y="14" width="44" height="44" rx="10" fill="#2E386E"/>
    <text x="36" y="42" fill="#fff" font-weight="900" font-size="14" text-anchor="middle">S</text>
    <text class="tool-name-w" x="72" y="32">Systeme.io</text>
    <text class="tool-sub-w" x="72" y="52">leads taggués, workflows déclenchés</text>
  </g>

  <g transform="translate(900, 510)">
    <rect x="-150" y="0" width="300" height="90" rx="14" fill="url(#grad)"/>
    <text x="0" y="38" fill="#fff" font-weight="900" font-size="28" letter-spacing="-0.02em" text-anchor="middle">9 €/mois</text>
    <text x="0" y="60" fill="#fff" font-weight="700" font-size="13" text-anchor="middle">ou 90 €/an (2 mois offerts)</text>
    <text x="0" y="80" fill="rgba(255,255,255,0.85)" font-weight="600" font-size="11" text-anchor="middle" letter-spacing="0.06em">QUIZ ILLIMITÉS · LEADS ILLIMITÉS</text>
  </g>

  <text x="1160" y="675" fill="#9AA0B5" font-size="12" font-weight="600" text-anchor="end">— tipote.fr/tiquiz</text>
</svg>
