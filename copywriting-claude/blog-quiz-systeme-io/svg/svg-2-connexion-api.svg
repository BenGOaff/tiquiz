<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid meet" style="font-family:'Inter','Plus Jakarta Sans',-apple-system,system-ui,sans-serif;" role="img" aria-labelledby="tqConnTitle tqConnDesc">
  <title id="tqConnTitle">Connexion entre Systeme.io et Tiquiz par clé API</title>
  <desc id="tqConnDesc">Schéma montrant comment copier la clé API depuis Systeme.io et la coller dans Tiquiz pour établir la connexion native</desc>

  <defs>
    <linearGradient id="tqConnGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5A6EF6"/>
      <stop offset="100%" stop-color="#20BBE6"/>
    </linearGradient>
    <filter id="tqConnShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#2E386E" flood-opacity="0.12"/>
    </filter>
  </defs>

  <style>
    .bg { fill: #F6F7FB; }
    .orb-i { fill: #5A6EF6; opacity: 0.07; }
    .orb-c { fill: #20BBE6; opacity: 0.07; }
    .card { fill: #fff; stroke: #E6E8F0; stroke-width: 1.5; }
    .card-sio { fill: #fff; stroke: rgba(30,58,138,0.25); stroke-width: 1.5; }
    .card-tq { fill: #fff; stroke: rgba(32,187,230,0.25); stroke-width: 1.5; }
    .hd { fill: #2E386E; font-weight: 900; font-size: 28px; letter-spacing: -0.03em; text-anchor: middle; }
    .sub { fill: #6B7280; font-weight: 500; font-size: 15px; text-anchor: middle; }
    .step { fill: #20BBE6; font-weight: 900; font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; }
    .label { fill: #2E386E; font-weight: 800; font-size: 16px; }
    .desc { fill: #6B7280; font-weight: 500; font-size: 13px; }
    .key { fill: #2E386E; font-weight: 800; font-size: 13px; font-family: 'Courier New', monospace; letter-spacing: 0.05em; }
    .badge { fill: #20BBE6; font-weight: 900; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; }
    @keyframes flowDash { to { stroke-dashoffset: -32; } }
    @keyframes pulse { 0%,100% { opacity: 0.85; } 50% { opacity: 1; } }
    .flow { stroke-dasharray: 10 6; animation: flowDash 1.4s linear infinite; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
  </style>

  <rect class="bg" x="0" y="0" width="1200" height="600" rx="24"/>
  <circle class="orb-i" cx="160" cy="120" r="200"/>
  <circle class="orb-c" cx="1040" cy="500" r="220"/>

  <text class="hd" x="600" y="55">La connexion Tiquiz ↔ Systeme.io en un copier-coller</text>
  <text class="sub" x="600" y="84">Une clé API personnelle, à coller une seule fois dans Tiquiz.</text>

  <!-- Card Systeme.io -->
  <g filter="url(#tqConnShadow)">
    <rect class="card-sio" x="60" y="140" width="420" height="320" rx="22"/>
  </g>
  <text class="step" x="84" y="178" fill="#1E3A8A">Étape 1 · dans Systeme.io</text>

  <g transform="translate(84, 200)">
    <rect x="0" y="0" width="40" height="40" rx="10" fill="#1E3A8A"/>
    <text x="20" y="27" fill="#fff" font-weight="900" font-size="16" text-anchor="middle">S</text>
    <text class="label" x="56" y="18">Systeme.io</text>
    <text class="desc" x="56" y="36">Paramètres → Clé MCP et API</text>
  </g>

  <!-- Mock UI: API key field -->
  <g transform="translate(84, 270)">
    <rect x="0" y="0" width="372" height="60" rx="10" fill="#F6F7FB" stroke="#E6E8F0"/>
    <text class="desc" x="14" y="20" fill="#9AA0B5" font-size="11" letter-spacing="0.06em" text-transform="uppercase" font-weight="700">CLÉ API "TIQUIZ"</text>
    <text class="key" x="14" y="44">sk_xxxxxxxxxxxxxxxxxxxxxxxxxxxx</text>
  </g>

  <g transform="translate(84, 350)">
    <rect x="0" y="0" width="120" height="34" rx="8" fill="url(#tqConnGrad)"/>
    <text x="60" y="22" fill="#fff" font-weight="800" font-size="13" text-anchor="middle">Copier ↗</text>
  </g>

  <text class="desc" x="84" y="420">Aucune date d'expiration : la clé fonctionne tout le temps.</text>

  <!-- Arrow flowing -->
  <g transform="translate(490, 290)">
    <line class="flow" x1="0" y1="0" x2="200" y2="0" stroke="#20BBE6" stroke-width="4" stroke-linecap="round"/>
    <polygon points="200,-10 220,0 200,10" fill="#20BBE6"/>
    <g class="pulse" transform="translate(110, -36)">
      <rect x="-50" y="0" width="100" height="26" rx="13" fill="url(#tqConnGrad)"/>
      <text x="0" y="18" fill="#fff" font-weight="800" font-size="12" text-anchor="middle">Crypté</text>
    </g>
  </g>

  <!-- Card Tiquiz -->
  <g filter="url(#tqConnShadow)">
    <rect class="card-tq" x="720" y="140" width="420" height="320" rx="22"/>
  </g>
  <text class="step" x="744" y="178">Étape 2 · dans Tiquiz</text>

  <g transform="translate(744, 200)">
    <rect x="0" y="0" width="40" height="40" rx="10" fill="url(#tqConnGrad)"/>
    <text x="20" y="27" fill="#fff" font-weight="900" font-size="13" text-anchor="middle">tq</text>
    <text class="label" x="56" y="18">Tiquiz</text>
    <text class="desc" x="56" y="36">Paramètres → Connexion Systeme.io</text>
  </g>

  <g transform="translate(744, 270)">
    <rect x="0" y="0" width="372" height="60" rx="10" fill="#E3F5FC" stroke="rgba(32,187,230,0.3)"/>
    <text class="desc" x="14" y="20" fill="#0EA2CB" font-size="11" letter-spacing="0.06em" text-transform="uppercase" font-weight="700">CLÉ API SYSTEME.IO</text>
    <text class="key" x="14" y="44" fill="#0EA2CB">sk_xxxxxxxxxxxxxxxxxxxxxxxxxxxx</text>
  </g>

  <g transform="translate(744, 350)">
    <rect x="0" y="0" width="130" height="34" rx="8" fill="#20BBE6"/>
    <text x="65" y="22" fill="#fff" font-weight="800" font-size="13" text-anchor="middle">Connecté ✓</text>
  </g>

  <text class="desc" x="744" y="420">Connexion établie. Plus rien à toucher.</text>

  <text x="1160" y="580" fill="#9AA0B5" font-size="12" font-weight="600" text-anchor="end">— tipote.fr/tiquiz</text>
</svg>
