<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid meet" style="font-family:'Inter','Plus Jakarta Sans',-apple-system,system-ui,sans-serif;" role="img" aria-labelledby="tqMapTitle tqMapDesc">
  <title id="tqMapTitle">Mapping de chaque profil de résultat vers son tag Systeme.io</title>
  <desc id="tqMapDesc">Visualisation du système de points qui répartit les visiteurs en profils de résultat, et du tag Systeme.io qui se déclenche pour chacun</desc>

  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5A6EF6"/>
      <stop offset="100%" stop-color="#20BBE6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#2E386E" flood-opacity="0.12"/>
    </filter>
  </defs>

  <style>
    .bg { fill: #F6F7FB; }
    .orb-i { fill: #5A6EF6; opacity: 0.07; }
    .orb-c { fill: #20BBE6; opacity: 0.07; }
    .hd { fill: #2E386E; font-weight: 900; font-size: 28px; letter-spacing: -0.03em; text-anchor: middle; }
    .sub { fill: #6B7280; font-weight: 500; font-size: 15px; text-anchor: middle; }
    .col-title { fill: #9AA0B5; font-weight: 700; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; }

    .card { fill: #fff; stroke: #E6E8F0; stroke-width: 1.5; }
    .card-result { stroke-width: 2; }
    .pts-text { fill: #fff; font-weight: 900; font-size: 14px; }
    .name { fill: #2E386E; font-weight: 800; font-size: 15px; }
    .desc { fill: #6B7280; font-weight: 500; font-size: 11px; }
    .tag-key { fill: #2E386E; font-weight: 800; font-size: 13px; font-family: 'Courier New', monospace; }
    .cta-text { fill: #6B7280; font-weight: 600; font-size: 11px; }

    @keyframes flow { to { stroke-dashoffset: -30; } }
    .flow-line { stroke-dasharray: 8 6; animation: flow 1.4s linear infinite; }
  </style>

  <rect class="bg" x="0" y="0" width="1200" height="600" rx="24"/>
  <circle class="orb-i" cx="160" cy="120" r="200"/>
  <circle class="orb-c" cx="1040" cy="500" r="220"/>

  <text class="hd" x="600" y="55">Tu colles le bon tag derrière chaque profil de résultat</text>
  <text class="sub" x="600" y="84">Tiquiz calcule les points, range le visiteur dans son profil, et pose le tag dans Systeme.io.</text>

  <!-- Quiz response -->
  <g filter="url(#shadow)" transform="translate(60, 145)">
    <rect class="card" x="0" y="0" width="280" height="330" rx="18"/>
    <text class="col-title" x="20" y="32">Réponses du visiteur</text>

    <g transform="translate(20, 56)">
      <rect x="0" y="0" width="240" height="44" rx="8" fill="#F6F7FB" stroke="#E6E8F0"/>
      <text x="14" y="20" fill="#9AA0B5" font-size="10" font-weight="700" letter-spacing="0.06em" text-transform="uppercase">Q1 réponse</text>
      <text x="14" y="36" fill="#2E386E" font-size="12" font-weight="700">+ 3 points · Motivée</text>
    </g>

    <g transform="translate(20, 110)">
      <rect x="0" y="0" width="240" height="44" rx="8" fill="#F6F7FB" stroke="#E6E8F0"/>
      <text x="14" y="20" fill="#9AA0B5" font-size="10" font-weight="700" letter-spacing="0.06em" text-transform="uppercase">Q2 réponse</text>
      <text x="14" y="36" fill="#2E386E" font-size="12" font-weight="700">+ 2 points · Motivée</text>
    </g>

    <g transform="translate(20, 164)">
      <rect x="0" y="0" width="240" height="44" rx="8" fill="#F6F7FB" stroke="#E6E8F0"/>
      <text x="14" y="20" fill="#9AA0B5" font-size="10" font-weight="700" letter-spacing="0.06em" text-transform="uppercase">Q3 réponse</text>
      <text x="14" y="36" fill="#2E386E" font-size="12" font-weight="700">+ 4 points · Motivée</text>
    </g>

    <g transform="translate(20, 218)">
      <rect x="0" y="0" width="240" height="44" rx="8" fill="#F6F7FB" stroke="#E6E8F0"/>
      <text x="14" y="20" fill="#9AA0B5" font-size="10" font-weight="700" letter-spacing="0.06em" text-transform="uppercase">Q4 réponse</text>
      <text x="14" y="36" fill="#2E386E" font-size="12" font-weight="700">+ 1 point · Motivée</text>
    </g>

    <g transform="translate(20, 272)">
      <rect x="0" y="0" width="240" height="38" rx="8" fill="url(#grad)"/>
      <text x="120" y="24" fill="#fff" font-size="13" font-weight="900" text-anchor="middle">Total : 10 pts → Motivée</text>
    </g>
  </g>

  <!-- Arrow 1 -->
  <g transform="translate(360, 305)">
    <line class="flow-line" x1="0" y1="0" x2="60" y2="0" stroke="#20BBE6" stroke-width="3" stroke-linecap="round"/>
    <polygon points="60,-6 72,0 60,6" fill="#20BBE6"/>
  </g>

  <!-- Profile result detail -->
  <g filter="url(#shadow)" transform="translate(450, 145)">
    <rect class="card-result card" x="0" y="0" width="320" height="330" rx="18" stroke="#20BBE6"/>
    <text class="col-title" x="20" y="32" fill="#0EA2CB">Profil détecté · Motivée</text>

    <g transform="translate(20, 50)">
      <circle cx="22" cy="22" r="22" fill="#20BBE6"/>
      <text x="22" y="29" fill="#fff" font-weight="900" font-size="18" text-anchor="middle">M</text>
      <text class="name" x="56" y="20">Motivée</text>
      <text class="desc" x="56" y="36">Niveau 2 · prête à acheter</text>
    </g>

    <g transform="translate(20, 110)">
      <text class="col-title" y="0">Page de résultat (générée)</text>
      <text x="0" y="20" fill="#2E386E" font-size="12" font-weight="700">Tu es prête à investir, Sandra</text>
      <text x="0" y="36" fill="#6B7280" font-size="11" font-weight="500">3 lignes de description ciblée</text>
      <text x="0" y="52" fill="#6B7280" font-size="11" font-weight="500">+ insight + projection 6 mois</text>
    </g>

    <g transform="translate(20, 180)">
      <text class="col-title" y="0">CTA personnalisé</text>
      <rect x="0" y="10" width="280" height="32" rx="8" fill="#EEF0FE"/>
      <text x="14" y="32" fill="#5A6EF6" font-size="12" font-weight="800">→ /programme-12-semaines</text>
    </g>

    <g transform="translate(20, 240)">
      <text class="col-title" y="0">Tag Systeme.io associé</text>
      <rect x="0" y="10" width="200" height="32" rx="6" fill="#E3F5FC" stroke="#20BBE6"/>
      <text class="tag-key" x="14" y="32" fill="#0EA2CB">quiz-motivee</text>
    </g>
  </g>

  <!-- Arrow 2 -->
  <g transform="translate(790, 305)">
    <line class="flow-line" x1="0" y1="0" x2="60" y2="0" stroke="#20BBE6" stroke-width="3" stroke-linecap="round"/>
    <polygon points="60,-6 72,0 60,6" fill="#20BBE6"/>
  </g>

  <!-- Systeme.io contact card -->
  <g filter="url(#shadow)" transform="translate(880, 145)">
    <rect class="card" x="0" y="0" width="260" height="330" rx="18"/>
    <text class="col-title" x="20" y="32">Dans Systeme.io</text>

    <g transform="translate(20, 56)">
      <rect x="0" y="0" width="220" height="56" rx="10" fill="#F6F7FB" stroke="#E6E8F0"/>
      <circle cx="22" cy="28" r="14" fill="#20BBE6"/>
      <text x="22" y="33" fill="#fff" font-weight="900" font-size="11" text-anchor="middle">SC</text>
      <text x="44" y="22" fill="#2E386E" font-size="12" font-weight="800">Sandra C.</text>
      <text x="44" y="38" fill="#6B7280" font-size="10" font-weight="600">sandra@email.com</text>
    </g>

    <g transform="translate(20, 130)">
      <text class="col-title" y="0">Tag posé automatiquement</text>
      <rect x="0" y="10" width="160" height="30" rx="6" fill="#E3F5FC" stroke="#20BBE6"/>
      <text class="tag-key" x="80" y="29" fill="#0EA2CB" text-anchor="middle">quiz-motivee</text>
    </g>

    <g transform="translate(20, 200)">
      <text class="col-title" y="0">Champ personnalisé</text>
      <rect x="0" y="10" width="220" height="38" rx="6" fill="#F6F7FB" stroke="#E6E8F0"/>
      <text x="14" y="26" fill="#9AA0B5" font-size="10" font-weight="700" letter-spacing="0.04em" text-transform="uppercase">tiquiz_result</text>
      <text x="14" y="42" fill="#2E386E" font-size="11" font-weight="700">"Motivée"</text>
    </g>

    <g transform="translate(20, 268)">
      <rect x="0" y="0" width="220" height="40" rx="8" fill="url(#grad)"/>
      <text x="110" y="18" fill="#fff" font-size="11" font-weight="800" text-anchor="middle">Workflow déclenché</text>
      <text x="110" y="32" fill="rgba(255,255,255,0.85)" font-size="9" font-weight="600" text-anchor="middle">→ formation, email, communauté</text>
    </g>
  </g>

  <text x="1160" y="580" fill="#9AA0B5" font-size="12" font-weight="600" text-anchor="end">— tipote.fr/tiquiz</text>
</svg>
