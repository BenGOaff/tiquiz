<!-- SVG 2 — Titres de quiz : 4 exemples de titres viraux sur mockups mobiles -->
<!-- À coller dans un bloc "Code HTML" de Systeme.io. -->
<!-- Responsive : s'adapte à la largeur du conteneur parent. -->

<div style="width:100%;max-width:960px;margin:2rem auto;">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid meet" style="width:100%;height:auto;display:block;font-family:'Inter','Plus Jakarta Sans',-apple-system,system-ui,sans-serif;" role="img" aria-labelledby="tqSvg2Title tqSvg2Desc">
  <title id="tqSvg2Title">Quatre exemples de titres de quiz viraux sur mockups mobiles</title>
  <desc id="tqSvg2Desc">Grille de quatre téléphones affichant chacun un titre de quiz différent : positionnement, diagnostic, maturité, audit</desc>

  <defs>
    <linearGradient id="tqGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5D6CDB"/>
      <stop offset="100%" stop-color="#20BBE6"/>
    </linearGradient>
    <linearGradient id="tqGrad2Soft" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EEF0FE"/>
      <stop offset="100%" stop-color="#E3F5FC"/>
    </linearGradient>
    <filter id="tqShadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#2E386E" flood-opacity="0.14"/>
    </filter>
  </defs>

  <style>
    .tq2-bg { fill: #F6F7FB; }
    .tq2-orb-indigo { fill: #5D6CDB; opacity: 0.07; }
    .tq2-orb-cyan { fill: #20BBE6; opacity: 0.07; }
    .tq2-phone-frame { fill: #1C1F2E; }
    .tq2-phone-screen { fill: #fff; }
    .tq2-notch { fill: #1C1F2E; }
    .tq2-eyebrow { fill: #0EA2CB; font-size: 10px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; }
    .tq2-qtitle { fill: #2E386E; font-weight: 900; letter-spacing: -0.02em; }
    .tq2-sub { fill: #6B7280; font-size: 11px; font-weight: 600; }
    .tq2-cta { fill: #fff; font-weight: 800; font-size: 13px; }
    .tq2-caption { fill: #2E386E; font-weight: 800; font-size: 16px; text-anchor: middle; }
    .tq2-hd { fill: #2E386E; font-weight: 900; font-size: 30px; letter-spacing: -0.03em; text-anchor: middle; }
    .tq2-hd-sub { fill: #6B7280; font-weight: 500; font-size: 15px; text-anchor: middle; }

    @keyframes tq2Float { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-6px) } }
    @keyframes tq2Pulse { 0%,100% { transform: scale(1); opacity: 0.88 } 50% { transform: scale(1.04); opacity: 1 } }
    .tq2-phone-float { animation: tq2Float 3.2s ease-in-out infinite; transform-origin: center; }
    .tq2-phone-d2 { animation-delay: 0.4s; }
    .tq2-phone-d3 { animation-delay: 0.8s; }
    .tq2-phone-d4 { animation-delay: 1.2s; }
    .tq2-btn-inner { animation: tq2Pulse 2.4s ease-in-out infinite; transform-origin: center; }
  </style>

  <!-- Fond + orbes -->
  <rect class="tq2-bg" x="0" y="0" width="1200" height="720" rx="24"/>
  <circle class="tq2-orb-indigo" cx="150" cy="120" r="200"/>
  <circle class="tq2-orb-cyan" cx="1050" cy="600" r="220"/>

  <!-- Titre -->
  <text class="tq2-hd" x="600" y="55">4 patterns de titres qui arrêtent le scroll</text>
  <text class="tq2-hd-sub" x="600" y="82">Chaque phone = un angle qui performe en 2026</text>

  <!-- ======== PHONE 1 — Positionnement ======== -->
  <g transform="translate(80, 115)">
    <g class="tq2-phone-float">
      <g filter="url(#tqShadow2)">
        <rect class="tq2-phone-frame" x="0" y="0" width="240" height="480" rx="36"/>
        <rect class="tq2-phone-screen" x="10" y="10" width="220" height="460" rx="28"/>
      </g>
      <rect class="tq2-notch" x="90" y="20" width="60" height="14" rx="7"/>
      <rect x="22" y="52" width="196" height="6" rx="3" fill="#E6E8F0"/>
      <rect x="22" y="80" width="196" height="320" rx="20" fill="url(#tqGrad2Soft)"/>
      <text class="tq2-eyebrow" x="40" y="115">Quiz · 2 min</text>
      <text class="tq2-qtitle" x="40" y="155" font-size="22">Quel type</text>
      <text class="tq2-qtitle" x="40" y="181" font-size="22">de coach</text>
      <text class="tq2-qtitle" x="40" y="207" font-size="22">es-tu ?</text>
      <text class="tq2-sub" x="40" y="240">4 profils détectés</text>
      <text class="tq2-sub" x="40" y="258">Résultat en direct</text>
      <!-- Bouton (animation sur inner) -->
      <g transform="translate(40, 285)">
        <g class="tq2-btn-inner">
          <rect x="0" y="0" width="160" height="40" rx="20" fill="url(#tqGrad2)"/>
          <text class="tq2-cta" x="80" y="25" text-anchor="middle">Commencer →</text>
        </g>
      </g>
      <rect x="40" y="345" width="130" height="6" rx="3" fill="#E6E8F0"/>
      <rect x="40" y="360" width="90" height="6" rx="3" fill="#E6E8F0"/>
    </g>
  </g>
  <text class="tq2-caption" x="200" y="625">1 · Positionnement</text>

  <!-- ======== PHONE 2 — Diagnostic ======== -->
  <g transform="translate(370, 115)">
    <g class="tq2-phone-float tq2-phone-d2">
      <g filter="url(#tqShadow2)">
        <rect class="tq2-phone-frame" x="0" y="0" width="240" height="480" rx="36"/>
        <rect class="tq2-phone-screen" x="10" y="10" width="220" height="460" rx="28"/>
      </g>
      <rect class="tq2-notch" x="90" y="20" width="60" height="14" rx="7"/>
      <rect x="22" y="52" width="196" height="6" rx="3" fill="#E6E8F0"/>
      <rect x="22" y="80" width="196" height="320" rx="20" fill="url(#tqGrad2Soft)"/>
      <text class="tq2-eyebrow" x="40" y="115">Diagnostic · 3 min</text>
      <text class="tq2-qtitle" x="40" y="155" font-size="20">Qu'est-ce qui</text>
      <text class="tq2-qtitle" x="40" y="178" font-size="20">bloque vraiment</text>
      <text class="tq2-qtitle" x="40" y="201" font-size="20">tes ventes ?</text>
      <text class="tq2-sub" x="40" y="234">5 profils · on creuse</text>
      <text class="tq2-sub" x="40" y="252">le vrai frein</text>
      <g transform="translate(40, 285)">
        <g class="tq2-btn-inner">
          <rect x="0" y="0" width="160" height="40" rx="20" fill="url(#tqGrad2)"/>
          <text class="tq2-cta" x="80" y="25" text-anchor="middle">Je découvre →</text>
        </g>
      </g>
      <rect x="40" y="345" width="140" height="6" rx="3" fill="#E6E8F0"/>
      <rect x="40" y="360" width="100" height="6" rx="3" fill="#E6E8F0"/>
    </g>
  </g>
  <text class="tq2-caption" x="490" y="625">2 · Diagnostic</text>

  <!-- ======== PHONE 3 — Maturité ======== -->
  <g transform="translate(660, 115)">
    <g class="tq2-phone-float tq2-phone-d3">
      <g filter="url(#tqShadow2)">
        <rect class="tq2-phone-frame" x="0" y="0" width="240" height="480" rx="36"/>
        <rect class="tq2-phone-screen" x="10" y="10" width="220" height="460" rx="28"/>
      </g>
      <rect class="tq2-notch" x="90" y="20" width="60" height="14" rx="7"/>
      <rect x="22" y="52" width="196" height="6" rx="3" fill="#E6E8F0"/>
      <rect x="22" y="80" width="196" height="320" rx="20" fill="url(#tqGrad2Soft)"/>
      <text class="tq2-eyebrow" x="40" y="115">Maturité · 4 min</text>
      <text class="tq2-qtitle" x="40" y="155" font-size="20">Dans 6 mois,</text>
      <text class="tq2-qtitle" x="40" y="178" font-size="20">où en sera</text>
      <text class="tq2-qtitle" x="40" y="201" font-size="20">ton business ?</text>
      <text class="tq2-sub" x="40" y="234">Projection précise</text>
      <text class="tq2-sub" x="40" y="252">selon tes réponses</text>
      <g transform="translate(40, 285)">
        <g class="tq2-btn-inner">
          <rect x="0" y="0" width="160" height="40" rx="20" fill="url(#tqGrad2)"/>
          <text class="tq2-cta" x="80" y="25" text-anchor="middle">Voir mon futur →</text>
        </g>
      </g>
      <rect x="40" y="345" width="150" height="6" rx="3" fill="#E6E8F0"/>
      <rect x="40" y="360" width="110" height="6" rx="3" fill="#E6E8F0"/>
    </g>
  </g>
  <text class="tq2-caption" x="780" y="625">3 · Maturité</text>

  <!-- ======== PHONE 4 — Audit ======== -->
  <g transform="translate(950, 115)">
    <g class="tq2-phone-float tq2-phone-d4">
      <g filter="url(#tqShadow2)">
        <rect class="tq2-phone-frame" x="0" y="0" width="240" height="480" rx="36"/>
        <rect class="tq2-phone-screen" x="10" y="10" width="220" height="460" rx="28"/>
      </g>
      <rect class="tq2-notch" x="90" y="20" width="60" height="14" rx="7"/>
      <rect x="22" y="52" width="196" height="6" rx="3" fill="#E6E8F0"/>
      <rect x="22" y="80" width="196" height="320" rx="20" fill="url(#tqGrad2Soft)"/>
      <text class="tq2-eyebrow" x="40" y="115">Audit · 2 min</text>
      <text class="tq2-qtitle" x="40" y="155" font-size="20">Ton tunnel</text>
      <text class="tq2-qtitle" x="40" y="178" font-size="20">est-il prêt à</text>
      <text class="tq2-qtitle" x="40" y="201" font-size="20">convertir ?</text>
      <text class="tq2-sub" x="40" y="234">8 points vérifiés</text>
      <text class="tq2-sub" x="40" y="252">note sur 100 en direct</text>
      <g transform="translate(40, 285)">
        <g class="tq2-btn-inner">
          <rect x="0" y="0" width="160" height="40" rx="20" fill="url(#tqGrad2)"/>
          <text class="tq2-cta" x="80" y="25" text-anchor="middle">Je teste →</text>
        </g>
      </g>
      <rect x="40" y="345" width="130" height="6" rx="3" fill="#E6E8F0"/>
      <rect x="40" y="360" width="95" height="6" rx="3" fill="#E6E8F0"/>
    </g>
  </g>
  <text class="tq2-caption" x="1070" y="625">4 · Audit express</text>

  <!-- Bande de rappel bas -->
  <g transform="translate(0, 655)">
    <rect x="80" y="0" width="1040" height="54" rx="16" fill="url(#tqGrad2)"/>
    <text x="600" y="34" fill="#fff" font-weight="900" font-size="18" text-anchor="middle">+ 2 autres angles : Étude de marché · Challenge direct</text>
  </g>

  <text x="1160" y="710" fill="#9AA0B5" font-size="12" font-weight="600" text-anchor="end">— tipote.fr/tiquiz</text>
</svg>
</div>
