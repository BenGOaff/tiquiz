<!-- SVG 3 — Viralité : mécanique du share bonus, 1 lead → N leads -->
<!-- À coller dans un bloc "Code HTML" de Systeme.io. -->
<!-- Responsive : s'adapte à la largeur du conteneur parent. -->

<div style="width:100%;max-width:960px;margin:2rem auto;">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" preserveAspectRatio="xMidYMid meet" style="width:100%;height:auto;display:block;font-family:'Inter','Plus Jakarta Sans',-apple-system,system-ui,sans-serif;" role="img" aria-labelledby="tqSvg3Title tqSvg3Desc">
  <title id="tqSvg3Title">Mécanique de viralité d'un quiz Tiquiz : un lead en amène plusieurs</title>
  <desc id="tqSvg3Desc">Schéma animé montrant comment un seul répondant au quiz déclenche le partage et ramène 5 nouveaux leads qualifiés en échange d'un bonus</desc>

  <defs>
    <linearGradient id="tqGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5D6CDB"/>
      <stop offset="100%" stop-color="#20BBE6"/>
    </linearGradient>
    <filter id="tqShadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#2E386E" flood-opacity="0.14"/>
    </filter>
  </defs>

  <style>
    .tq3-bg { fill: #F6F7FB; }
    .tq3-orb-indigo { fill: #5D6CDB; opacity: 0.08; }
    .tq3-orb-cyan { fill: #20BBE6; opacity: 0.08; }
    .tq3-card { fill: #fff; stroke: rgba(93,108,219,0.2); stroke-width: 1.5; }
    .tq3-step { fill: #20BBE6; font-weight: 900; font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; }
    .tq3-title { fill: #2E386E; font-weight: 900; font-size: 18px; letter-spacing: -0.02em; }
    .tq3-sub { fill: #6B7280; font-size: 13px; font-weight: 500; }
    .tq3-mult { fill: #fff; font-weight: 900; font-size: 58px; letter-spacing: -0.04em; }
    .tq3-mult-lbl { fill: #fff; font-weight: 700; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.85; }
    .tq3-bonus-t { fill: #fff; font-weight: 900; font-size: 15px; letter-spacing: -0.01em; }
    .tq3-bonus-s { fill: rgba(255,255,255,0.88); font-size: 11px; font-weight: 600; }
    .tq3-hd { fill: #2E386E; font-weight: 900; font-size: 28px; letter-spacing: -0.03em; text-anchor: middle; }
    .tq3-hd-sub { fill: #6B7280; font-weight: 500; font-size: 14px; text-anchor: middle; }

    @keyframes tq3FlowDash { to { stroke-dashoffset: -32 } }
    @keyframes tq3PulseOpacity { 0%,100% { opacity: 0.9 } 50% { opacity: 1 } }
    @keyframes tq3BounceY { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-4px) } }
    @keyframes tq3Wiggle { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-4px) } }

    .tq3-flow1 { stroke-dasharray: 10 6; animation: tq3FlowDash 1.4s linear infinite; }
    .tq3-flow2 { stroke-dasharray: 10 6; animation: tq3FlowDash 1.4s linear infinite; animation-delay: 0.2s; }
    .tq3-pulse-inner { animation: tq3PulseOpacity 2s ease-in-out infinite; }
    .tq3-bonus-inner { animation: tq3Wiggle 3s ease-in-out infinite; transform-origin: center; }
    .tq3-share-inner { animation: tq3BounceY 2s ease-in-out infinite; transform-origin: center; }
    .tq3-share-d1 { animation-delay: 0.2s; }
    .tq3-share-d2 { animation-delay: 0.4s; }
    .tq3-share-d3 { animation-delay: 0.6s; }
    .tq3-new-inner { animation: tq3BounceY 2.5s ease-in-out infinite; transform-origin: center; }
    .tq3-new-d1 { animation-delay: 0.3s; }
    .tq3-new-d2 { animation-delay: 0.6s; }
    .tq3-new-d3 { animation-delay: 0.9s; }
    .tq3-new-d4 { animation-delay: 1.2s; }
  </style>

  <!-- Fond + orbes -->
  <rect class="tq3-bg" x="0" y="0" width="1200" height="620" rx="24"/>
  <circle class="tq3-orb-indigo" cx="120" cy="80" r="200"/>
  <circle class="tq3-orb-cyan" cx="1080" cy="540" r="220"/>

  <!-- Titre -->
  <text class="tq3-hd" x="600" y="50">1 lead devient 4 à 6 leads qualifiés. Sans pub.</text>
  <text class="tq3-hd-sub" x="600" y="76">C'est la mécanique du share bonus intégrée à Tiquiz.</text>

  <!-- ========== ÉTAPE 1 ========== -->
  <g transform="translate(50, 160)">
    <g filter="url(#tqShadow3)">
      <rect class="tq3-card" x="0" y="0" width="260" height="260" rx="22"/>
    </g>
    <text class="tq3-step" x="20" y="32">Étape 1</text>
    <text class="tq3-title" x="20" y="58">Lead répond</text>
    <text class="tq3-title" x="20" y="80">au quiz</text>

    <g transform="translate(130, 150)">
      <g class="tq3-pulse-inner">
        <circle cx="0" cy="0" r="52" fill="#20BBE6" opacity="0.15"/>
        <circle cx="0" cy="0" r="38" fill="url(#tqGrad3)"/>
        <circle cx="0" cy="-8" r="11" fill="#fff"/>
        <path d="M-18,12 Q0,-2 18,12 L18,22 L-18,22 Z" fill="#fff"/>
      </g>
    </g>
    <text class="tq3-sub" x="130" y="232" text-anchor="middle">Sandra · coach canin</text>
    <text class="tq3-sub" x="130" y="248" text-anchor="middle" fill="#9AA0B5">Profil détecté : Motivée</text>
  </g>

  <!-- Flèche 1 -->
  <g transform="translate(320, 290)">
    <line class="tq3-flow1" x1="0" y1="0" x2="100" y2="0" stroke="#20BBE6" stroke-width="4" stroke-linecap="round"/>
    <polygon points="100,-8 115,0 100,8" fill="#20BBE6"/>
  </g>

  <!-- ========== ÉTAPE 2 ========== -->
  <g transform="translate(450, 160)">
    <g filter="url(#tqShadow3)">
      <rect x="0" y="0" width="300" height="260" rx="22" fill="url(#tqGrad3)"/>
    </g>
    <text class="tq3-step" x="20" y="32" fill="#fff">Étape 2 · Partage</text>
    <text class="tq3-bonus-t" x="20" y="58" font-size="17">Pour voir son résultat</text>
    <text class="tq3-bonus-t" x="20" y="79" font-size="17">complet, partage le quiz</text>
    <text class="tq3-bonus-s" x="20" y="102">→ bonus débloqué à son retour</text>

    <!-- Bonus card wiggle -->
    <g transform="translate(150, 150)">
      <g class="tq3-bonus-inner">
        <rect x="-130" y="-25" width="260" height="60" rx="14" fill="#fff"/>
        <text x="-110" y="-5" fill="#0EA2CB" font-weight="900" font-size="10" letter-spacing="0.1em">BONUS DÉBLOQUÉ</text>
        <text x="-110" y="20" fill="#2E386E" font-weight="900" font-size="16">− 20 € sur ton programme</text>
      </g>
    </g>

    <!-- Share icons -->
    <g transform="translate(20, 210)">
      <g>
        <g class="tq3-share-inner">
          <rect x="0" y="0" width="54" height="36" rx="10" fill="#fff"/>
          <text x="27" y="23" fill="#E4405F" font-weight="900" font-size="11" text-anchor="middle">IG</text>
        </g>
      </g>
      <g transform="translate(66, 0)">
        <g class="tq3-share-inner tq3-share-d1">
          <rect x="0" y="0" width="54" height="36" rx="10" fill="#fff"/>
          <text x="27" y="23" fill="#0A66C2" font-weight="900" font-size="9" text-anchor="middle">LinkedIn</text>
        </g>
      </g>
      <g transform="translate(132, 0)">
        <g class="tq3-share-inner tq3-share-d2">
          <rect x="0" y="0" width="54" height="36" rx="10" fill="#fff"/>
          <text x="27" y="23" fill="#111" font-weight="900" font-size="10" text-anchor="middle">TikTok</text>
        </g>
      </g>
      <g transform="translate(198, 0)">
        <g class="tq3-share-inner tq3-share-d3">
          <rect x="0" y="0" width="54" height="36" rx="10" fill="#fff"/>
          <text x="27" y="23" fill="#1DA1F2" font-weight="900" font-size="11" text-anchor="middle">X/Fb</text>
        </g>
      </g>
    </g>
  </g>

  <!-- Flèche 2 -->
  <g transform="translate(760, 290)">
    <line class="tq3-flow2" x1="0" y1="0" x2="100" y2="0" stroke="#20BBE6" stroke-width="4" stroke-linecap="round"/>
    <polygon points="100,-8 115,0 100,8" fill="#20BBE6"/>
  </g>

  <!-- ========== ÉTAPE 3 ========== -->
  <g transform="translate(890, 160)">
    <g filter="url(#tqShadow3)">
      <rect class="tq3-card" x="0" y="0" width="260" height="260" rx="22"/>
    </g>
    <text class="tq3-step" x="20" y="32">Étape 3</text>
    <text class="tq3-title" x="20" y="58">Nouveaux leads</text>
    <text class="tq3-title" x="20" y="80">qualifiés</text>

    <!-- 5 new leads — cercles à positions fixes, animation sur inner -->
    <g transform="translate(60, 130)">
      <g class="tq3-new-inner">
        <circle cx="0" cy="0" r="20" fill="#5D6CDB"/>
        <text x="0" y="5" fill="#fff" font-weight="900" font-size="12" text-anchor="middle">+1</text>
      </g>
    </g>
    <g transform="translate(130, 120)">
      <g class="tq3-new-inner tq3-new-d1">
        <circle cx="0" cy="0" r="20" fill="#20BBE6"/>
        <text x="0" y="5" fill="#fff" font-weight="900" font-size="12" text-anchor="middle">+1</text>
      </g>
    </g>
    <g transform="translate(200, 130)">
      <g class="tq3-new-inner tq3-new-d2">
        <circle cx="0" cy="0" r="20" fill="#3F4DBA"/>
        <text x="0" y="5" fill="#fff" font-weight="900" font-size="12" text-anchor="middle">+1</text>
      </g>
    </g>
    <g transform="translate(90, 185)">
      <g class="tq3-new-inner tq3-new-d3">
        <circle cx="0" cy="0" r="20" fill="#0EA2CB"/>
        <text x="0" y="5" fill="#fff" font-weight="900" font-size="12" text-anchor="middle">+1</text>
      </g>
    </g>
    <g transform="translate(170, 185)">
      <g class="tq3-new-inner tq3-new-d4">
        <circle cx="0" cy="0" r="20" fill="#5D6CDB"/>
        <text x="0" y="5" fill="#fff" font-weight="900" font-size="12" text-anchor="middle">+1</text>
      </g>
    </g>

    <text class="tq3-sub" x="130" y="232" text-anchor="middle">Tous taggués dans Systeme.io</text>
    <text class="tq3-sub" x="130" y="248" text-anchor="middle" fill="#9AA0B5">automatiquement</text>
  </g>

  <!-- Multiplicateur bas -->
  <g transform="translate(50, 460)">
    <rect x="0" y="0" width="1100" height="100" rx="18" fill="url(#tqGrad3)"/>
    <text class="tq3-mult-lbl" x="40" y="36">Résultat</text>
    <text x="40" y="76" fill="#fff" font-weight="900" font-size="22" letter-spacing="-0.02em">Une audience qui grandit toute seule, sans investir un euro en publicité.</text>
    <text class="tq3-mult" x="1050" y="75" text-anchor="middle">× 5</text>
  </g>

  <text x="1160" y="605" fill="#9AA0B5" font-size="12" font-weight="600" text-anchor="end">— tipote.fr/tiquiz</text>
</svg>
</div>
